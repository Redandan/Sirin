id: vip_maintain
name: "VIP 維護"
description: "分析 VIP 客戶的歷史互動記錄，生成個性化維護建議與跟進計劃。"
category: "research"
enabled: true
requires_approval: false
backed_by_tools: []
example_prompts:
  - "幫我看一下 VIP 的情況"
  - "這個客戶最近有沒有互動"
  - "VIP 維護建議"
  - "客戶關係分析"
  - "哪些 VIP 需要主動聯繫"
  - "跟進 VIP 客戶"
trigger_keywords:
  - "vip"
  - "VIP"
  - "客戶維護"
  - "跟進客戶"
  - "客戶關係"
# 腳本路徑（相對於項目根目錄）。
# 腳本從 stdin 讀取 JSON，結果輸出到 stdout。
script_file: "config/scripts/vip_maintain.rhai"
script_timeout_secs: 30
prompt_template: |
  使用 skill_execute 工具，skill_id = "vip_maintain"，
  將用戶的原始請求作為 user_input 傳入。
  腳本輸出即為最終建議，直接呈現給用戶，無需二次加工。
