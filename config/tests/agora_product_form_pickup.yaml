id: agora_product_form_pickup
name: "AgoraMarket 商品表單 Pickup 設定儲存還原驗證 (Issue #70 #3 #5 #10 #25)"
url: "https://redandan.github.io/?__test_role=seller"

max_iterations: 35
timeout_secs: 600

# Seller 後台是 PC 桌面版，使用標準桌面 viewport
viewport:
  width: 1280
  height: 900
  scale: 1.0
  mobile: false

locale: zh-TW

kb_refs:
  - agora-pickup-flow

goal: |
  目標：端到端驗證商品表單 pickup 設定流程 — 涵蓋 Issue #70 silent bugs #3 / #5 / #10 / #25。
    - #3  pickup service type 預設值非空
    - #5  pickup checkboxes 修改後儲存，重新編輯時 switches 必須完整還原
    - #10 商品上架表單可順利進入並展開物流設定
    - #25 編輯後儲存的物流設定在重新編輯時被完整保留

  起始狀態：以賣家身份登入，已在賣家儀表板首頁（URL auto-login via __test_role=seller）。

  已知資訊（嚴格遵守）：
  - 賣家首頁是儀表板，不是商品列表。必須先點底部「商品」tab 才能進入商品管理列表。
  - 商品管理列表：每個商品卡片有「編輯」按鈕。
  - 商品編輯頁的「物流設定」按鈕在 1280×900 PC viewport 下位於畫面下方（viewport 外）。
    必須先 flutter_scroll_until_visible 捲動到按鈕可見，再 shadow_click 才能成功展開。
  - 五個物流服務：宅配到府、7-ELEVEN、全家、萊爾富、OK超商。
  - 儲存按鈕叫「保存商品」或「更新商品」（不是「儲存」）。
  - 儲存後頁面會返回商品列表（或顯示 toast）。

  ⚠️ 本測試三輪閉環，缺一不可：
     第一輪（步驟 1-11）：進入商品編輯 → 展開物流設定 → enable_a11y → 記錄狀態A
     第二輪（步驟 12-19）：切換其中一個 pickup 開關 → 點保存商品 → 等待返回列表
     第三輪（步驟 20-30）：再次進入商品編輯 → 展開物流設定 → enable_a11y → 記錄狀態C → done=true
     最終比對：狀態C 必須反映第二輪的修改（Bug #5/#25 驗證）。

  ⚠️ 唯一允許 done=true 的位置是步驟 34，其他步驟不能 done=true。
  ⚠️ 不論任何步驟失敗，都必須繼續執行到步驟 34 才能輸出 done=true。嚴禁提早終止。

  步驟（線性，全部 34 步必須依序執行）：

  === 第一輪：記錄狀態 A ===
  1. wait 3000（等賣家儀表板完整載入）
  2. shadow_click role=tab name_regex="^商品$"（進入商品管理列表）
  3. wait 2500
  4. shadow_click role=button name_regex="^編輯$"（第一個商品的編輯按鈕）
  5. wait 4000
  6. flutter_scroll_until_visible role=button name_regex="物流設定"（捲動到物流設定按鈕）
  7. shadow_click role=button name_regex="^物流設定$"（展開物流設定區塊）
  8. wait 1500
  9. enable_a11y（展開後重建 AX tree）
  10. wait 800
  11. screenshot_analyze "【第一輪/狀態A】記錄：宅配到府、7-ELEVEN、全家 的開關（開/關）與運費。Bug #3 — 若有 service type 欄位顯示為空請記錄，若無此欄位也記錄（可能 UI 已改版）。"

  === 第二輪：修改並儲存 ===
  12. scroll y=800（捲動確保物流服務表格可見）
  13. wait 500
  14. enable_a11y（更新 AX tree）
  15. ax_find role=switch（列出所有 switch 的 backend_id；第1個是「商品狀態」，第2個起是物流服務開關）
  ⚠️ AX tree 第1個 switch = 商品狀態，第2個 switch = 宅配到府物流服務開關。
     使用 ax_find 取得的第2個 backend_id（跳過第1個商品狀態）。
  16. ax_click backend_id=<第2個switch的backend_id>（點擊宅配到府物流服務開關）
  17. wait 1200
  18. screenshot_analyze "【第二輪/修改後】記錄：剛剛切換的是哪個物流服務開關？現在是開還是關？（確認不是商品狀態）"
  19. flutter_scroll_until_visible role=button name_regex="保存商品|更新商品|儲存"（捲回找儲存按鈕）
  20. shadow_click role=button name_regex="^保存商品$|^更新商品$|^儲存$|^Save$"
  21. wait 4000（等儲存完成 + 返回列表動畫）

  === 第三輪：重新編輯，確認狀態 C ===
  22. shadow_click role=tab name_regex="^商品$"（確保在商品列表；若已在列表則無害點擊）
  23. wait 2500
  24. enable_a11y（重新初始化 Flutter semantics）
  25. wait 1000
  26. shadow_click role=button name_regex="^編輯$"（再次進入同商品編輯頁）
  27. wait 4000
  28. flutter_scroll_until_visible role=button name_regex="物流設定"（捲動到物流設定）
  29. shadow_click role=button name_regex="^物流設定$"（展開物流設定）
  30. wait 1500
  31. enable_a11y（展開後重建 AX tree）
  32. wait 800
  33. screenshot_analyze "【第三輪/狀態C】記錄：宅配到府、7-ELEVEN、全家 的開關狀態與運費。與步驟 18 的修改後狀態是否一致？（Bug #5/#25 PASS 條件：步驟 16 切換的那個開關，重新編輯時值必須與步驟 18 相同）"
  34. done=true

success_criteria:
  - "第一輪成功進入商品編輯頁並展開物流設定（涵蓋 #10）"
  - "成功切換至少一個物流服務開關（宅配到府，使用 ax_click 第2個 switch）並完成儲存返回列表"
  - "第三輪重新編輯後展開物流設定，狀態C 反映第二輪的修改（Bug #5/#25 PASS）"

tags: [regression, product, pickup, save-reload, agora, critical, issue-70, issue-48]
