id: agora_c2c_wallet_deposit
name: "C2C 核心流程：買家錢包儲值 UI 驗證"
url: "https://redandan.github.io/?__test_role=buyer"

max_iterations: 22
timeout_secs: 300
max_retries: 1

viewport:
  width: 390
  height: 844
  scale: 2.0
  mobile: true

locale: zh-TW

goal: |
  目標：驗證買家錢包儲值功能的 UI 可正常載入，包含金額選擇和儲值按鈕。

  已知資訊：
  - 錢包頁有「儲值」按鈕，點擊後到 #/wallet/deposit
  - 儲值頁顯示當前餘額（USDT）
  - 有快速選擇金額按鈕：$10, $50, $100, $500, $1000
  - 有「創建儲值」確認按鈕（不實際操作，只驗 UI）

  ⚠️ 步驟 16 無條件 done=true，嚴禁提早終止。

  步驟（線性，步驟 16 done=true）：
  1. goto target="https://redandan.github.io/?__test_role=buyer"（防前一測試 session 污染）
  2. wait 5000（等 auto-login + Flutter 買家首頁載入）
  3. enable_a11y
  4. wait 2000
  5. shadow_click role=tab name_regex="^錢包$"（點底部錢包 tab）
  6. wait 2500
  7. enable_a11y（路由切換後重新初始化 AX tree）
  8. wait 1000
  9. shadow_click role=button name_regex="^儲值$"（進入儲值頁）
  10. wait 2500
  11. enable_a11y
  12. wait 1000
  13. shadow_dump（確認在儲值頁，找到金額按鈕和創建儲值按鈕）
  14. screenshot_analyze "是否在儲值頁？有沒有當前餘額顯示？有沒有快速選擇金額按鈕（$10/$50/$100）？有沒有「創建儲值」按鈕？"
  15. wait 500
  16. done=true

success_criteria:
  - "成功從錢包頁進入儲值頁（#/wallet/deposit）"
  - "顯示當前 USDT 餘額（或看到錢包餘額資訊）"
  - "有快速選擇金額按鈕或儲值相關 UI"
  - "有「創建儲值」按鈕或等效的確認按鈕（不實際儲值）"

tags: [c2c, buyer, wallet, deposit, regression, core-flow]
