id: agora_c2c_transaction_lifecycle
name: "C2C 完整交易生命週期：買家下單→賣家出貨→買家確認→評價"
url: "https://redandan.github.io/?__test_role=buyer"

max_iterations: 50
timeout_secs: 1200

# H5 mobile viewport（買家/賣家都是 H5）
viewport:
  width: 390
  height: 844
  scale: 2.0
  mobile: true

locale: zh-TW

goal: |
  目標：完整走過 C2C 核心交易流程的 4 個階段，驗證每個角色的核心操作。

  ⚠️ 這是跨角色測試，使用 goto 切換 __test_role：
     - 買家：?__test_role=buyer
     - 賣家：?__test_role=seller
  ⚠️ 切換 role 必須：clear_state → 立即 goto ?__test_role=X → wait 5000（不能在 goto 前 wait）
  ⚠️ 嚴禁 click_point。不論任何步驟失敗都繼續到步驟 47 done=true（最後一步）。

  ════════════════════════════════════════
  【階段 1：買家搜尋商品並下單】
  ════════════════════════════════════════
  1. goto target="https://redandan.github.io/?__test_role=buyer"（確保從買家首頁開始）
  2. wait 5000（等 auto-login + Flutter 首頁載入）
  3. enable_a11y
  4. wait 2000
  5. enable_a11y（二次確保 AX tree 就緒）
  6. wait 1000
  7. shadow_click role=button name_regex="USDT"（進入商品詳情）
  8. wait 2500
  9. screenshot_analyze "【A1】商品詳情頁：記錄商品名稱和價格。"
  10. scroll y=400
  11. shadow_click role=button name_regex="^購買$"（開啟 SKU 對話框）
  12. wait 2000
  13. shadow_click role=button name_regex="128GB|256GB|64GB|32GB"（選規格）
  14. wait 1000
  15. shadow_click role=button name_regex="^確認購買$"（到結帳確認頁）
  16. wait 3000
  17. enable_a11y
  18. wait 1000
  19. screenshot_analyze "【A2】結帳確認頁：看到商品摘要和「確認購買 USDT X」按鈕嗎？"
  20. shadow_click role=button name_regex="確認購買 USDT"（真實下單）
  21. wait 4000
  22. screenshot_analyze "【A3】下單後狀態：頁面跳轉到哪裡？記錄當前頁面。"

  ════════════════════════════════════════
  【階段 2：賣家查看訂單並出貨】
  ════════════════════════════════════════
  23. clear_state
  24. goto target="https://redandan.github.io/?__test_role=seller"（⚠️ 角色切換後立即 goto）
  25. wait 5000（等 auto-login + seller 首頁載入）
  26. enable_a11y
  27. wait 2000
  28. shadow_click role=tab name_regex="^訂單$"
  29. wait 2500
  30. enable_a11y
  31. wait 1000
  32. screenshot_analyze "【B1】賣家訂單頁：有沒有待出貨訂單？記錄訂單列表狀態（有幾筆/訂單內容）。"
  33. shadow_click role=tab name_regex="^待出貨$"
  34. wait 1500
  35. screenshot_analyze "【B2】待出貨 tab：有沒有新訂單？若有，記錄第一筆的商品名和金額。"

  ════════════════════════════════════════
  【階段 3：買家查看訂單狀態】
  ════════════════════════════════════════
  36. clear_state
  37. goto target="https://redandan.github.io/?__test_role=buyer#/orders"（⚠️ 角色切換後立即 goto）
  38. wait 5000（等 auto-login + buyer 訂單頁載入）
  39. enable_a11y
  40. wait 2000
  41. screenshot_analyze "【C1】買家訂單頁：有沒有訂單記錄？訂單狀態是什麼（待出貨/待收貨/已完成）？記錄最新一筆。"

  ════════════════════════════════════════
  【階段 4：確認收貨（若有待收貨訂單）】
  ════════════════════════════════════════
  42. enable_a11y（Phase 4 開始前重新初始化 AX tree）
  43. wait 1000
  44. shadow_click role=tab name_regex="^待收貨$"（嘗試切到待收貨 tab，失敗也繼續）
  45. wait 1500
  46. screenshot_analyze "【D1】記錄當前狀態：待收貨 tab 有無訂單？若切換失敗也記錄頁面狀態。"
  47. done=true

success_criteria:
  - "【A】買家成功到達結帳確認頁並執行下單"
  - "【B】賣家能進入訂單管理頁，看到訂單（有或資料格式錯誤均記錄）"
  - "【C】買家訂單頁能載入（有訂單或顯示錯誤均記錄）"
  - "【D】嘗試切換到待收貨 tab 並截圖記錄結果（切換成功或失敗均合格，記錄即通過）"

tags: [c2c, e2e, lifecycle, buyer, seller, regression, critical]
