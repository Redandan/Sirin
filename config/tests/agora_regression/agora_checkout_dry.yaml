id: agora_checkout_dry
name: "AgoraMarket Checkout DRY 驗證 (Issue #70 #45)"
url: "https://redandan.github.io/?__test_role=buyer"

max_iterations: 25
timeout_secs: 300
max_retries: 1  # H5 Flutter 偶發 Chrome 初始化延遲，自動重試一次

# H5 mobile viewport — AgoraMarket 會員端是手機版 App，必須用手機 viewport 測試
viewport:
  width: 390
  height: 844
  scale: 2.0
  mobile: true


goal: |
  目標：驗證「直接購買」flow 結帳頁 UI 正常（Issue #70 #45）。

  起始狀態：以買家身份登入，已在首頁（URL auto-login via __test_role=buyer）。

  ⚠️ Flutter CanvasKit app：所有 UI 判斷用 screenshot_analyze。
  ⚠️ 安全模式：看到「下單」或「Place Order」按鈕即算通過，絕對不點擊下單！

  步驟（直接購買 flow）：
  1. wait 3000（等買家首頁完整載入）
  2. enable_a11y（初始化 Flutter semantics）
  3. wait 1500
  4. screenshot_analyze "確認在首頁，看到商品卡片"
  5. shadow_click role=button name_regex="USDT"（點第一個商品卡進入詳情）
  6. wait 2500
  7. screenshot_analyze "是否在商品詳情頁？看到商品名稱、價格？"
  8. scroll y=400（向下捲動找底部購買按鈕）
  9. screenshot_analyze "是否看到「立即購買」、「確認購買」或類似按鈕？"
  10. shadow_click role=button name_regex="立即購買|確認購買|Buy Now|直接購買|購買"
  11. wait 3000
  12. screenshot_analyze "是否進入結帳頁？看到訂單摘要、金額、下單按鈕嗎？記錄狀態。"
  13. done=true（不要點下單！記錄結帳頁 UI 狀態即可）

success_criteria:
  - "從商品詳情頁可進入結帳頁面"
  - "結帳頁顯示訂單摘要與金額"
  - "「下單」按鈕存在且可點擊（非 disabled 狀態）"
  - "無 console error 或 'Something went wrong' 訊息"

tags: [checkout, agora, issue-70, regression, refactor-verification]


