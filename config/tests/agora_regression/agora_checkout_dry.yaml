id: agora_checkout_dry
name: "AgoraMarket Checkout DRY 驗證 (Issue #70 #45)"
url: "https://redandan.github.io/?__test_role=buyer"

max_iterations: 25
timeout_secs: 300
max_retries: 1  # H5 Flutter 偶發 Chrome 初始化延遲，自動重試一次

# H5 mobile viewport — AgoraMarket 會員端是手機版 App，必須用手機 viewport 測試
viewport:
  width: 390
  height: 844
  scale: 2.0
  mobile: true


goal: |
  目標：驗證「直接購買」flow 結帳頁 UI 正常（Issue #70 #45）。

  起始狀態：以買家身份登入，已在首頁（URL auto-login via __test_role=buyer）。

  ⚠️ Flutter CanvasKit app：所有 UI 判斷用 screenshot_analyze。
  ⚠️ 安全模式：看到「下單」或「Place Order」按鈕即算通過，絕對不點擊下單！

  步驟（直接購買 flow）：
  1. screenshot_analyze "確認在首頁，看到商品卡片"
  2. shadow_click role=button name_regex="USDT"（點第一個商品卡進入詳情）
  3. wait 2000 → screenshot_analyze "是否在商品詳情頁？看到商品名稱、價格？"
  4. 向下捲動 400px（scroll y=400，找底部購買按鈕）
  5. screenshot_analyze "是否看到「立即購買」、「確認購買」或類似按鈕？"
  6. shadow_click role=button name_regex="立即購買|確認購買|Buy Now|直接購買|購買"
  7. wait 3000 → screenshot_analyze "是否進入結帳頁？看到訂單摘要、金額、下單按鈕嗎？"
  8. 若看到結帳頁有訂單金額 → done=true（不要點下單！記錄「結帳頁 UI 正常」）
  9. 若找不到購買按鈕（3 次嘗試後）→ screenshot_analyze 記錄當前狀態 → done=true

success_criteria:
  - "從商品詳情頁可進入結帳頁面"
  - "結帳頁顯示訂單摘要與金額"
  - "「下單」按鈕存在且可點擊（非 disabled 狀態）"
  - "無 console error 或 'Something went wrong' 訊息"

tags: [checkout, agora, issue-70, regression, refactor-verification]


