id: agora_seller_wallet
name: "AgoraMarket 賣家錢包頁面驗證 v2 (AM#117 fix)"
url: "https://redandan.github.io/?__test_role=seller"

max_iterations: 20
timeout_secs: 300

# Seller 後台是 H5 手機版，與 Buyer 相同 viewport
viewport:
  width: 390
  height: 844
  scale: 2.0
  mobile: true

locale: zh-TW

goal: |
  目標：確認賣家可從儀表板點擊「賣家錢包」進入錢包頁，並看到餘額與操作按鈕。

  ✅ AgoraMarket #117 已修復 AppCard InkWell Semantics，
     shadow_click role=button name_regex="賣家錢包" 可正常導航到 #/seller/wallet。

  ⚠️ Flutter app：所有 UI 判斷用 screenshot_analyze。
  ⚠️ 步驟 14 無條件 done=true，嚴禁提早終止。

  步驟（線性，步驟 14 done=true）：
  1. goto target="https://redandan.github.io/?__test_role=seller"（確保 seller 登入）
  2. wait 5000（等 auto-login + Flutter 賣家儀表板載入）
  3. enable_a11y
  4. wait 2000
  5. screenshot_analyze "賣家儀表板首頁：看到哪些快速操作卡片（賣場設定/批量導入商品/賣家錢包）？"
  6. shadow_click role=button name_regex="賣家錢包"（點擊錢包卡片進入 #/seller/wallet）
  7. wait 3000（等錢包頁載入）
  8. enable_a11y
  9. wait 1500
  10. screenshot_analyze "錢包頁截圖：看到 USDT 餘額嗎？有哪些操作按鈕（儲值/提現/轉帳等）？顯示哪些資訊？"
  11. shadow_dump（列出錢包頁所有可見節點）
  12. scroll y=300（確認下方有無更多資訊）
  13. screenshot_analyze "捲動後：有沒有交易歷史或其他錢包資訊？"
  14. done=true

success_criteria:
  - "成功從儀表板點擊「賣家錢包」卡片並導航到錢包頁（#/seller/wallet）"
  - "錢包頁顯示 USDT 餘額（數字或 0）"
  - "有操作按鈕（儲值/提現/轉帳或類似功能）"

tags: [regression, wallet, seller, agora, am-117-verified]

