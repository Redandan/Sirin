id: agora_pickup_service_default
name: "AgoraMarket Pickup Service Type 預設值驗證 (Issue #70 #3)"
url: "https://redandan.github.io/?__test_role=seller"

browser_headless: false
max_iterations: 4
timeout_secs: 90

goal: |
  目標：驗證商品新增頁 pickup service type 欄位有正確預設值（Issue #70 Critical Bug #3）。

  起始狀態：以賣家身份登入，已在賣家首頁（URL auto-login via __test_role=seller）。

  ⚠️ Flutter CanvasKit app：所有 UI 判斷用 screenshot_analyze。

  ⚠️ 賣家後台 AX role=button，商品卡 name 含 USDT。

  步驟（2步驟即完成）：
  1. screenshot_analyze "在賣家後台看到什麼？有商品列表嗎？有新增商品按鈕嗎？記錄頁面內容。"
  2. done=true（記錄所見內容即可）

success_criteria:
  - "成功進入賣家後台並能看到商品管理入口"
  - "找到新增商品按鈕（或記錄找不到）"

tags: [regression, product, pickup, agora, critical, issue-70]
