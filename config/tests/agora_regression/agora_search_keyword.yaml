id: agora_search_keyword
name: "商品關鍵字搜尋測試"
url: "https://redandan.github.io/?__test_role=buyer"
locale: zh-TW

max_iterations: 25
timeout_secs: 360
max_retries: 1  # H5 Flutter 偶發 Chrome 初始化延遲，自動重試一次

# H5 mobile viewport — AgoraMarket 會員端是手機版 App，必須用手機 viewport 測試
viewport:
  width: 390
  height: 844
  scale: 2.0
  mobile: true


goal: |
  目標：確認買家可搜尋商品並看到結果。

  起始狀態：以買家身份登入，已在首頁（URL auto-login via __test_role=buyer）。

  ⚠️ Flutter CanvasKit app：所有 UI 判斷用 screenshot_analyze。
  ⚠️ 搜尋詞用 "iPhone"（ASCII，flutter_type 完整支援）。
  ⚠️ 嚴禁 click_point — 只用 shadow_click 和 eval。

  搜尋入口 fallback（依序嘗試）：
  A. shadow_click role=textfield name_regex="搜尋|Search|搜索|Keyword|關鍵字"
  B. shadow_click role=button name_regex="搜尋|Search|搜索|magnifying|放大鏡|🔍"
  C. eval target='window.location.hash="#/search"'（hash route 直連搜尋頁）

  步驟（線性，步驟 13 無條件 done=true）：
  1. goto target="https://redandan.github.io/?__test_role=buyer"（防 session 污染）
  2. wait 4000（等 auto-login + Flutter 首頁載入）
  3. enable_a11y
  4. wait 1500
  5. screenshot_analyze "確認在首頁。頂部有搜尋圖示嗎？有搜尋欄嗎？"
  6. shadow_dump（列出所有 role=button 和 role=textfield）
  7. 依 A→B→C 順序嘗試搜尋入口（前面成功就繼續）
  8. wait 1500
  9. flutter_type text="iPhone"
  10. wait 500
  11. flutter_enter（送出搜尋；若失敗則 shadow_click role=button name_regex="搜尋|Search|🔍" 再試）
  12. wait 2500
  13. screenshot_analyze "搜尋後頁面是什麼狀態？有商品列表嗎？"
  14. done=true

success_criteria:
  - "成功找到搜尋入口（搜尋欄、搜尋圖示、或任何搜尋相關 UI）"
  - "嘗試輸入 ASCII 關鍵字後頁面正常（無崩潰）"

tags: [agora, regression, search]


