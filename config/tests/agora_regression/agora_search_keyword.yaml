id: agora_search_keyword
name: "中文關鍵字搜尋測試"
url: "https://agoramarket.purrtechllc.com"
locale: zh-TW

browser_headless: false
max_iterations: 12
timeout_secs: 180

goal: |
  測試 AgoraMarket 搜尋功能：

  ⚠️ Flutter CanvasKit app：用 screenshot_analyze 做所有 UI 判斷。

  執行步驟：
  1. 等待 5 秒讓 Flutter 載入
  2. screenshot_analyze "頁面顯示什麼？首頁是否已載入？有搜尋框嗎？"
  3. 找到搜尋框（通常在頁面頂部，圖示為放大鏡），點擊進入搜尋模式
  4. 輸入中文關鍵字「手機」
  5. 等待搜尋結果出現（最多 5 秒）
  6. screenshot_analyze "搜尋結果頁面顯示什麼？有商品列表嗎？還是顯示空狀態？"
  7. 驗證結果列表非空：至少出現一筆商品
  8. screenshot_analyze "列出的商品名稱或描述是否包含或相關於搜尋關鍵字？"
  9. 點擊第一筆搜尋結果，等待詳情頁載入
  10. screenshot_analyze "現在顯示的是商品詳情頁嗎？有商品名稱和價格嗎？"

success_criteria:
  - "搜尋框可以找到並成功輸入中文關鍵字"
  - "搜尋後出現結果列表，不顯示空狀態或錯誤訊息"
  - "搜尋結果與輸入關鍵字相關（商品名稱或分類包含相關詞）"
  - "點擊搜尋結果可成功進入商品詳情頁"
  - "整個搜尋流程無 console error 或頁面崩潰"

tags: [agora, regression, search]
