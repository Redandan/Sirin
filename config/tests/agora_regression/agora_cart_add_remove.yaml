id: agora_cart_add_remove
name: "商品詳情頁購買按鈕驗證"
url: "https://redandan.github.io/?__test_role=buyer"

browser_headless: false
max_iterations: 12
timeout_secs: 180

locale: zh-TW

goal: |
  目標：確認商品詳情頁有購買相關按鈕，記錄 AgoraMarket 的購買流程入口。

  起始狀態：以買家身份登入，已在首頁（URL auto-login via __test_role=buyer）。

  ⚠️ Flutter CanvasKit app：所有 UI 判斷用 screenshot_analyze。
  ⚠️ 商品卡 role=button，name 含 USDT 價格；底部 tab：role=tab name="商品/訂單/錢包/我的"。
  ⚠️ AgoraMarket 可能是直接購買（無購物車），記錄實際有哪些購買按鈕即可。

  步驟：
  1. shadow_click role=button name_regex="USDT"（點第一個商品卡進入詳情）
  2. wait 2500 → screenshot_analyze "是否在商品詳情頁？看到哪些按鈕？"
  3. 向下捲動 300px（scroll y=300）
  4. shadow_dump（查看詳情頁所有按鈕名稱）
  5. screenshot_analyze "有「加入購物車」按鈕嗎？還是只有「立即購買」？記錄所有購買相關按鈕"
  6. done=true（記錄商品詳情頁的購買入口：cart/直接購買/其他）

success_criteria:
  - "成功進入商品詳情頁"
  - "看到至少一個購買相關按鈕（加入購物車、立即購買、或其他）"

tags: [agora, regression, cart]
