id: agora_c2c_contact_seller
name: "C2C 核心流程：買家聯繫賣家（聊天入口）"
url: "https://redandan.github.io/?__test_role=buyer"

max_iterations: 18
timeout_secs: 240
max_retries: 1

viewport:
  width: 390
  height: 844
  scale: 2.0
  mobile: true

locale: zh-TW

goal: |
  目標：驗證買家可從商品詳情頁點「聯繫賣家」進入聊天頁面，
  並看到聊天模板選項和發送功能。

  已知資訊：
  - 商品詳情頁底部有「聯繫賣家」按鈕
  - 點擊後導航到 #/chat/new/{sellerId}
  - 聊天頁有預設模板（checkbox）：「你好，我想諮詢一下」等
  - 有語音通話、上傳圖片等互動按鈕（確認按鈕需選模板後才顯示）

  ⚠️ 步驟 14 無條件 done=true。

  步驟（線性，步驟 14 done=true）：
  1. wait 3000
  2. enable_a11y
  3. wait 1500
  4. shadow_click role=button name_regex="USDT"（進入商品詳情）
  5. wait 2500
  6. enable_a11y
  7. wait 1000
  8. shadow_click role=button name_regex="^聯繫賣家$"（開啟聊天）
  9. wait 3000
  10. enable_a11y
  11. wait 1000
  12. shadow_dump（確認在聊天頁，找到模板 checkbox 和功能按鈕）
  13. screenshot_analyze "是否在聊天頁面（#/chat/）？有沒有預設訊息模板（checkbox 選項）或對話框？記錄頁面主要 UI 元素。"
  14. done=true

success_criteria:
  - "成功從商品詳情頁開啟聊天"
  - "聊天頁面顯示對話歷史或空白聊天框"
  - "有預設訊息模板選項（checkbox）或輸入框"
  - "聊天頁面可正常開啟（有預設訊息模板或輸入框）"

tags: [c2c, buyer, chat, contact-seller, regression, core-flow]
