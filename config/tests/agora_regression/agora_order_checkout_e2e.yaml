id: agora_order_checkout_e2e
name: "AgoraMarket 核心下單流程 E2E (Issue #49 / #70 #6,#45,#74)"
url: "https://redandan.github.io/?__test_role=buyer"

max_iterations: 25
timeout_secs: 360
# H5 mobile viewport — AgoraMarket 會員端是手機版 App，必須用手機 viewport 測試
viewport:
  width: 390
  height: 844
  scale: 2.0
  mobile: true
max_retries: 1  # H5 Flutter 偶發 Chrome 初始化延遲，自動重試一次

retry_on_parse_error: 5

locale: zh-TW
goal: |
  目標：驗證買家加入購物車 → 進入購物車 → 看到結帳按鈕的完整流程。

  起始狀態：買家已 auto-login（URL ?__test_role=buyer），位於首頁商品列表。

  ⚠️ 所有點擊只用 shadow_click（role + name_regex）。嚴禁 click_point。
  ⚠️ 購物車結帳按鈕實際名稱是「全部結帳」（非「結帳」或「前往結帳」）。
  ⚠️ 步驟 16 無條件 done=true，嚴禁提早終止。

  步驟（線性，步驟 16 無條件 done=true）：
  1. wait 3000（等首頁完整載入）
  2. enable_a11y（初始化 Flutter semantics）
  3. wait 2000
  4. enable_a11y（二次確保 AX tree 就緒，防 host empty 錯誤）
  5. wait 1000
  6. shadow_click role=button name_regex="USDT"（點第一個商品卡進入詳情）
  7. wait 2500
  8. screenshot_analyze "是否在商品詳情頁？記錄商品名稱、價格和可見的購買按鈕。"
  9. scroll y=400（捲到底部確認按鈕存在）
  10. shadow_dump（列出詳情頁所有 button，確認有「加入購物車」和「購買」按鈕）
  11. goto target="https://redandan.github.io/?__test_role=buyer#/cart"（直接導航到購物車頁）
  12. wait 2500
  13. enable_a11y
  14. wait 1000
  15. screenshot_analyze "購物車頁面截圖：頁面是否正常載入？如果有商品，有沒有「全部結帳」按鈕？如果購物車是空的，有沒有「去購物」或空購物車提示？"
  16. done=true

success_criteria:
  - "成功點擊商品卡進入詳情頁，看到商品名稱、價格和購買按鈕"
  - "成功導航到購物車頁面（頁面正常載入）"
  - "購物車頁面有預期 UI（有商品時顯示「全部結帳」，無商品時顯示空購物車提示）"

tags: [agora, regression, e2e, checkout, order, issue-49, issue-70, critical]


