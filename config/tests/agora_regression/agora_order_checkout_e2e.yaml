id: agora_order_checkout_e2e
name: "AgoraMarket 核心下單流程 E2E (Issue #49 / #70 #6,#45,#74)"
url: "https://redandan.github.io/?__test_role=buyer"

max_iterations: 25
timeout_secs: 360
# H5 mobile viewport — AgoraMarket 會員端是手機版 App，必須用手機 viewport 測試
viewport:
  width: 390
  height: 844
  scale: 2.0
  mobile: true
max_retries: 1  # H5 Flutter 偶發 Chrome 初始化延遲，自動重試一次

retry_on_parse_error: 5

locale: zh-TW
goal: |
  目標：驗證買家加入購物車 → 進入購物車 → 看到結帳按鈕的完整流程。

  起始狀態：買家已 auto-login（URL ?__test_role=buyer），位於首頁商品列表。

  ⚠️ 所有點擊只用 shadow_click（role + name_regex）。嚴禁 click_point。
  ⚠️ 加入購物車後會彈出規格選擇（SKU），必須先選規格再確認加入。
  ⚠️ 購物車結帳按鈕實際名稱是「全部結帳」（非「結帳」或「前往結帳」）。
  ⚠️ 步驟 20 無條件 done=true，嚴禁提早終止。

  步驟（線性，步驟 20 無條件 done=true）：
  1. wait 3000（等首頁完整載入）
  2. enable_a11y（初始化 Flutter semantics）
  3. wait 1500
  4. shadow_click role=button name_regex="USDT"（點第一個商品卡進入詳情）
  5. wait 2500
  6. screenshot_analyze "是否在商品詳情頁？記錄商品名稱、價格。"
  7. scroll y=400（捲到底部找購買按鈕）
  8. shadow_click role=button name_regex="^加入購物車$"（彈出規格選擇 SKU 彈窗）
  9. wait 2000
  10. shadow_click role=button name_regex="128GB|256GB|32GB|64GB|規格|SKU"（選第一個規格選項）
  11. wait 1000
  12. shadow_click role=button name_regex="^加入購物車$"（確認加入購物車）
  13. wait 2000
  14. shadow_click role=button name_regex="^購物車$"（點頂部購物車圖示進入購物車）
  15. wait 2500
  16. enable_a11y（確保購物車頁 Flutter semantics 已更新）
  17. wait 1000
  18. shadow_dump（列出購物車頁所有元素，確認頁面已載入 + 找到「全部結帳」按鈕）
  19. screenshot_analyze "是否在購物車頁面？看到剛加入的商品嗎？有「全部結帳」按鈕嗎？"
  20. done=true

  ⚠️ 步驟 18 shadow_dump + 步驟 19 screenshot_analyze 均必須執行。
  ⚠️ 不可在步驟 18 前 done=true。

success_criteria:
  - "成功點擊商品卡進入詳情頁"
  - "成功選擇規格並加入購物車"
  - "成功進入購物車頁，看到「全部結帳」按鈕（確認購物車結帳流程可用）"
  - "成功點擊下單按鈕並完成下單請求（頁面跳轉或顯示成功訊息）"
  - "新訂單出現在「我的訂單」列表（含商品名與金額）"
  - "全程無 'Something went wrong' 錯誤訊息或 console error"

tags: [agora, regression, e2e, checkout, order, issue-49, issue-70, critical]


