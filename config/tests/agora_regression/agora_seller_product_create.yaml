id: agora_seller_product_create
name: "AgoraMarket 賣家新增商品表單驗證"
url: "https://redandan.github.io/?__test_role=seller"

max_iterations: 25
timeout_secs: 600

# Seller 後台是 PC 桌面版，使用標準桌面 viewport
viewport:
  width: 1280
  height: 900
  scale: 1.0
  mobile: false

locale: zh-TW

goal: |
  目標：確認賣家可正常進入「新增商品」頁面，表單欄位和物流設定預設值正確。

  起始狀態：以賣家身份登入，已在賣家儀表板首頁（URL auto-login via __test_role=seller）。

  ⚠️ 賣家首頁是儀表板（賣場設定/批量導入商品），不是商品列表。
    必須先點底部「商品」tab 才能進入商品管理列表。
  ⚠️ 商品管理列表頂部有「新增商品」按鈕，用 shadow_click 點擊。
  ⚠️ 新增商品頁面的「物流設定」按鈕位於頁面下方，需先 flutter_scroll_until_visible 捲到可見。
  ⚠️ 物流設定是 ExpansionTile（Flutter AX role=group），展開後加 enable_a11y + wait 800 再截圖。
  ⚠️ 新增商品預設：宅配到府 ON + 7-ELEVEN ON，其餘 OFF。
  ⚠️ Flutter app：所有 UI 判斷用 screenshot_analyze。
  ⚠️ 不論任何步驟失敗，都必須繼續執行到步驟 17 才能輸出 done=true。嚴禁提早終止。

  步驟（線性，步驟 15 無條件 done=true，不得提早）：
  1. clear_state（清除 service worker 快取，確保載入最新版 Flutter app）
  2. wait 5000（等 Flutter 重新初始化）
  3. enable_a11y（初始化 Flutter semantics）
  4. wait 2000
  5. shadow_click role=tab name_regex="^商品$"（點底部商品 tab，進入商品管理列表）
  6. wait 2500（等商品管理列表載入）
  7. enable_a11y（重新初始化 Flutter semantics）
  8. wait 1000
  9. shadow_click role=button name_regex="^新增商品$"（點新增商品按鈕）
  10. wait 4000（等新增商品頁面完整載入）
  11. flutter_scroll_until_visible role=button name_regex="物流設定"（捲動到物流設定按鈕）
  12. shadow_click role=button name_regex="^物流設定$"（展開物流設定區塊）
  13. wait 1500
  14. enable_a11y（展開後重建 AX tree）
  15. wait 800
  16. screenshot_analyze "截圖。宅配到府開關是開還是關？預設運費是多少？7-ELEVEN 開關是開還是關？運費是多少？（只需回答這兩項，簡短即可）"
  17. done=true

success_criteria:
  - "成功從商品管理列表點擊新增商品並進入新增頁面"
  - "展開物流設定並看到至少宅配到府和 7-ELEVEN 兩個物流服務的開關（新增商品預設 ON）"
  - "物流服務運費欄位有非零值（宅配和 7-ELEVEN 的運費欄位不是空白）"

tags: [regression, product, seller, create, agora]


