id: agora_navigation_breadcrumb
name: "頁面導航與返回測試"
url: "https://redandan.github.io/?__test_role=buyer"

browser_headless: false
max_iterations: 25
timeout_secs: 300

locale: zh-TW

goal: |
  目標：確認買家可從首頁進入商品詳情頁，並按返回回到上一頁。

  起始狀態：以買家身份登入，已在首頁（URL auto-login via __test_role=buyer）。

  ⚠️ Flutter CanvasKit app：所有 UI 判斷用 screenshot_analyze。
  ⚠️ 商品卡不是 button role，用 screenshot_analyze 找座標再 click_point 點擊。

  步驟：
  ⚠️ 商品卡在 AX 樹為 role=button，name 含多行（評分+商品名+價格），用 name_regex="USDT" 匹配。

  1. shadow_click role=button name_regex="USDT"（點第一個含 USDT 價格的商品卡）
  2. wait 2500
  3. screenshot_analyze "是否在商品詳情頁？看到商品名稱、價格、左上角返回箭頭嗎？"
  4. 若在商品詳情頁：
     - click_point x=28 y=28（左上角返回箭頭）
     - wait 1500
     - screenshot_analyze "是否回到首頁？看到商品卡片列表嗎？"
     - 若回到首頁 → done=true
  5. 若步驟 1 失敗：click_point x=260 y=300（商品卡位置備用）
  6. wait 2000 → screenshot_analyze → 若進入詳情 → 按返回 → done=true
  7. 3 次嘗試後仍失敗 → screenshot_analyze 記錄 → done=true

success_criteria:
  - "從首頁可進入商品詳情頁（URL 路由改變）"
  - "商品詳情頁顯示商品名稱、價格、商品描述"
  - "按返回後回到首頁或商品列表（非白屏或錯誤頁）"
  - "導航流程中無白屏或頁面崩潰"

tags: [agora, regression, navigation]
