id: agora_navigation_breadcrumb
name: "頁面導航與返回測試"
url: "https://redandan.github.io/?__test_role=buyer"

max_iterations: 12
timeout_secs: 180
max_retries: 1  # H5 Flutter 偶發 Chrome 初始化延遲，自動重試一次

# H5 mobile viewport — AgoraMarket 會員端是手機版 App，必須用手機 viewport 測試
viewport:
  width: 390
  height: 844
  scale: 2.0
  mobile: true


locale: zh-TW

goal: |
  目標：確認買家可從首頁進入商品詳情頁，並按返回回到上一頁。

  起始狀態：以買家身份登入，已在首頁（URL auto-login via __test_role=buyer）。

  ⚠️ Flutter app：所有 UI 判斷用 screenshot_analyze 或 shadow_dump。
  ⚠️ Flutter nav 按鈕必須用 shadow_click（click_point 發 CDP 事件，被 Flutter 攔截無效）。
  ⚠️ 商品卡 AX 樹：role=button，name 含多行文字與 USDT 價格。
  ⚠️ 即使某個步驟找不到元素也繼續往下，不要重試同一步驟。

  ⚠️ Flutter AppBar 返回按鈕在 AX 樹無名稱、selector 不穩，
     本測試一律用 eval window.history.back() + wait_for_url 等 hash 變化，
     避開 visual selector，避免 174s timeout。

  步驟（線性，步驟 11 無條件 done=true）：
  1. wait_for_url target="__test_role=buyer" timeout=8000
  2. wait 2000（等 Flutter 首頁完整渲染）
  3. enable_a11y（初始化 Flutter semantics）
  4. wait 1000
  5. screenshot_analyze "確認在首頁，看到商品卡片列表嗎？"
  6. shadow_click role=button name_regex="USDT"（點第一個商品卡）
  7. wait 2500
  8. screenshot_analyze "是否進入商品詳情頁？看到商品名稱和價格嗎？"
  9. eval target='window.history.back()'（觸發瀏覽器返回上一頁）
  10. wait_for_url target="^https://redandan.github.io/(\\?[^#]*)?(#/?)?$" timeout=8000
     （等待 hash 路由回到首頁；若 timeout 也繼續，記錄狀態即可）
  11. screenshot_analyze "是否回到首頁商品列表？目前頁面狀態？"
  12. done=true

success_criteria:
  - "從首頁可進入商品詳情頁（看到商品名稱與價格）"
  - "商品詳情頁正常顯示（無白屏、無崩潰）"
  - "呼叫 history.back() + wait_for_url 後記錄頁面狀態（回到列表或仍在詳情頁都是有效資訊）"

tags: [agora, regression, navigation]


