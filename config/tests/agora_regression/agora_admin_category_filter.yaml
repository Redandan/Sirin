id: agora_admin_category_filter
name: "AgoraMarket Admin 商品分類篩選驗證 (Issue #70 #4)"
url: "https://redandan.github.io/?__test_role=admin"

browser_headless: false
max_iterations: 8
timeout_secs: 240

goal: |
  驗證 admin 商品管理頁的分類篩選功能（Issue #70 Bug #4）。

  起始狀態：以管理員身份登入，已在 admin 後台（預設可能在統計頁 /admin/statistics）。

  步驟：
  1. screenshot_analyze "確認目前在哪個 admin 頁面？"
  2. 若不在商品管理頁 → 找並點擊商品管理導航項目：
     shadow_click role=button name_regex="商品|Products|商品管理"
     或 shadow_click role=link name_regex="商品|Products"
  3. wait 1500 → screenshot_analyze "是否在商品管理頁？有商品列表和篩選區嗎？"
  4. 若有篩選 dropdown → shadow_click role=combobox
  5. wait 1000 → screenshot_analyze "dropdown 展開了嗎？"
  6. done=true（記錄商品管理頁是否可到達、是否有分類篩選）

  ⚠️ 最多 6 個 iteration，立刻 done=true。

success_criteria:
  - "Admin 商品管理頁可開啟"
  - "找到分類篩選下拉選單並能點擊（或記錄無下拉選單 bug）"

tags: [regression, admin, category-filter, agora, critical, issue-70]
