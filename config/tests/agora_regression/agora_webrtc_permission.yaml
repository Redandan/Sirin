id: agora_webrtc_permission
name: "AgoraMarket WebRTC Permission 修復驗證 (Issue #70 #1)"
url: "https://redandan.github.io/?__test_role=buyer"

# Flutter CanvasKit: headless Chrome 不 paint，必須開啟實體視窗

max_iterations: 15
timeout_secs: 240
max_retries: 1  # H5 Flutter 偶發 Chrome 初始化延遲，自動重試一次

goal: |
  目標：驗證 AgoraMarket WebRTC 麥克風/攝影機 permission 問題已修復（Issue #70 Critical Bug #1）。
  進入商品詳情頁找「聯繫賣家」或「客服」按鈕，確認通話/聊天功能可正常開啟，不崩潰。

  起始狀態：以買家身份登入，已在首頁（URL auto-login via __test_role=buyer）。

  ⚠️ Flutter CanvasKit app：所有 UI 判斷用 screenshot_analyze。
  ⚠️ 嚴禁提早終止：必須執行完所有步驟才能 done=true。

  步驟（按順序執行，不跳過）：
  1. screenshot_analyze "確認在首頁，看到商品列表和底部 tab"
  2. shadow_click role=button name_regex="USDT"（進入第一個商品詳情頁）
  3. wait 2500
  4. screenshot_analyze "是否在商品詳情頁？找聯繫賣家/客服/通話相關按鈕"
  5. shadow_dump（查看詳情頁所有按鈕，找通話/聊天入口）
  6. shadow_click role=button name_regex="聯繫賣家|客服|通話|視訊|Chat|Call|WebRTC|聊聊"
  7. wait 3000
  8. screenshot_analyze "是否進入聊天/通話頁面？出現 permission 請求彈窗？還是錯誤訊息？記錄所有結果"
  9. done=true

  ⚠️ 必須完整執行步驟 1-9，嚴禁在步驟 1 後立即 done=true。
  ⚠️ 若步驟 6 找不到聯繫賣家按鈕，繼續執行步驟 7-9（記錄無此功能）。

success_criteria:
  - "頁面正常載入，有實際內容（非全黑或白屏）"
  - "成功進入商品詳情頁，找到並嘗試點擊通話/聊天入口"
  - "記錄系統回應：進入聊天室、permission dialog 出現、功能不存在、或錯誤訊息"
  - "沒有顯示 camera/microphone 永久 denied 或授權永遠失敗的錯誤"

tags: [regression, webrtc, agora, critical, issue-70]

