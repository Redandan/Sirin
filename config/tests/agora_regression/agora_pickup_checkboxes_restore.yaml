id: agora_pickup_checkboxes_restore
name: "AgoraMarket 商品編輯取消後物流設定還原驗證 (Issue #70 #5)"
url: "https://redandan.github.io/?__test_role=seller"

max_iterations: 25
timeout_secs: 420

# Seller 後台是 PC 桌面版，使用標準桌面 viewport
viewport:
  width: 1280
  height: 900
  scale: 1.0
  mobile: false

locale: zh-TW

# Hard-won pickup-flow lessons auto-injected when KB_ENABLED=1.  Covers
# Flutter 商品/編輯/物流設定 navigation, animation timing, five 物流
# service names, infra traps already worked-around by Sirin runtime.
kb_refs:
  - agora-pickup-flow

goal: |
  目標：驗證商品編輯物流設定（delivery service switches）取消後能正確還原（Issue #70 Bug #5）。
  修復前的 bug：取消編輯後重新開啟商品，switches 仍顯示未儲存的修改值。

  起始狀態：以賣家身份登入，已在賣家儀表板首頁（URL auto-login via __test_role=seller）。

  已知資訊（嚴格遵守）：
  - 賣家首頁是儀表板，不是商品列表。必須點底部「商品」tab 才能進入商品管理列表。
  - 商品管理列表：每個商品卡片有「編輯」按鈕。
  - 商品編輯頁有「物流設定」按鈕，點擊展開宅配到府/7-ELEVEN/全家等服務開關。
  - 退出編輯頁用 eval window.history.back() + wait_for_ax_ready
    （go_back 在 hash route 下偶爾跳 about:blank，改用 JS history.back() 較穩）。
  - 退出後會回到賣家儀表板，需再次點「商品」tab 才能看到商品列表。

  ⚠️ 本測試分兩輪，缺一不可：
     第一輪（步驟 1-8）：進入商品編輯 → 展開物流設定 → screenshot_analyze 記錄狀態A
     第二輪（步驟 9-17）：go_back 退出 → 再次進入商品編輯 → 展開物流設定 → screenshot_analyze 記錄狀態B → done=true
  ⚠️ 唯一允許 done=true 的位置是步驟 17，其他任何步驟都不能 done=true。
  ⚠️ 步驟 6 展開物流設定≠完成，必須繼續執行步驟 7-17。

  步驟（全部 17 步必須依序執行）：
  1. wait 3000
  2. shadow_click role=tab name_regex="^商品$"
  3. wait 2500
  4. shadow_click role=button name_regex="^編輯$"
  5. wait 4000
  6. flutter_scroll_until_visible role=button name_regex="物流設定"（捲動到按鈕可見）
  7. shadow_click role=button name_regex="^物流設定$"（展開物流設定）
  8. wait 1500
  9. screenshot_analyze "【第一輪/狀態A】記錄：宅配到府、7-ELEVEN、全家 的開關是開還是關？"
  10. eval target='window.history.back()'
     （hash route 下用 JS history.back() 退出編輯，避免 go_back 跳 about:blank）
     接著 wait_for_ax_ready timeout=6000；若仍非預期，fallback navigate_to
     "https://redandan.github.io/?__test_role=seller#/seller/products" 重新進入。
  11. shadow_click role=tab name_regex="^商品$"
  12. wait 2500
  13. shadow_click role=button name_regex="^編輯$"
  14. wait 4000
  15. flutter_scroll_until_visible role=button name_regex="物流設定"（捲動到按鈕可見）
  16. shadow_click role=button name_regex="^物流設定$"（展開物流設定）
  17. wait 1500
  18. screenshot_analyze "【第二輪/狀態B】記錄：宅配到府、7-ELEVEN、全家 的開關是開還是關？與步驟9狀態A相同嗎？（Bug #5 驗證：go_back 後重進應顯示相同的原始儲存狀態）"
  19. done=true

  ⚠️ 步驟 8 的 screenshot_analyze 是第一輪結束點，嚴禁步驟 8 前 done=true。
  ⚠️ 步驟 9 用 eval window.history.back() + wait_for_ax_ready；
     僅當頁面跳到 about:blank 或 AX tree 為空時，才 navigate_to 強制重進入。
  ⚠️ 步驟 16 的 screenshot_analyze 是第二輪結束點，嚴禁步驟 16 前 done=true。

success_criteria:
  - "成功兩次進入商品編輯頁並展開物流設定"
  - "狀態A（取消前）和狀態B（重新開啟後）的物流服務開關狀態一致（Bug #5 regression PASS）"
  - "不出現「未儲存的修改值」殘留（go_back 後重新開啟 = 原始儲存狀態）"

tags: [regression, product, pickup, checkboxes, agora, critical, issue-70]


