id: agora_pickup_checkboxes_restore
name: "AgoraMarket Pickup Checkboxes 還原驗證 (Issue #70 #5)"
url: "https://redandan.github.io/?__test_role=seller"

browser_headless: false
max_iterations: 15
timeout_secs: 180

goal: |
  目標：驗證商品編輯 pickup checkboxes 取消後還原（Issue #70 Critical Bug #5）。
  修復前：取消編輯後重新開啟，checkboxes 仍顯示未儲存的修改值。

  起始狀態：以賣家身份登入，已在賣家首頁（URL auto-login via __test_role=seller）。

  ⚠️ Flutter CanvasKit app：所有 UI 判斷用 screenshot_analyze。

  ⚠️ Flutter CanvasKit app：所有 UI 判斷用 screenshot_analyze。
  ⚠️ 商品卡 role=button，用 shadow_click role=button name_regex="USDT" 開啟商品。

  步驟（探索模式）：
  1. screenshot_analyze "確認在賣家後台，看到什麼頁面？"
  2. shadow_click role=button name_regex="USDT"（點第一個商品卡）
     若找不到 USDT → screenshot_analyze 記錄頁面狀態 → done=true
  3. wait 2000 → screenshot_analyze "點擊後進入哪個頁面？看到表單欄位嗎？"
  4. 向下捲動 500px（scroll y=500）
  5. screenshot_analyze "捲動後看到 pickup/出貨 相關欄位了嗎？有 checkbox 嗎？"
  6. done=true（記錄：能否開啟賣家商品頁，以及是否看到 pickup 設定 checkbox）

success_criteria:
  - "成功進入賣家後台"
  - "嘗試開啟商品（USDT 卡片）並記錄結果（能到詳情頁、或找不到）"

tags: [regression, product, pickup, checkboxes, agora, critical, issue-70]
