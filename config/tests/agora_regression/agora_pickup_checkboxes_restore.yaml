id: agora_pickup_checkboxes_restore
name: "AgoraMarket 商品編輯取消後物流設定還原驗證 (Issue #70 #5)"
url: "https://redandan.github.io/?__test_role=seller"

max_iterations: 25
timeout_secs: 420

locale: zh-TW

# Hard-won pickup-flow lessons auto-injected when KB_ENABLED=1.  Covers
# Flutter 商品/編輯/物流設定 navigation, animation timing, five 物流
# service names, infra traps already worked-around by Sirin runtime.
kb_refs:
  - agora-pickup-flow

goal: |
  目標：驗證商品編輯物流設定（delivery service switches）取消後能正確還原（Issue #70 Bug #5）。
  修復前的 bug：取消編輯後重新開啟商品，switches 仍顯示未儲存的修改值。

  起始狀態：以賣家身份登入，已在賣家儀表板首頁（URL auto-login via __test_role=seller）。

  已知資訊（嚴格遵守）：
  - 賣家首頁是儀表板，不是商品列表。必須點底部「商品」tab 才能進入商品管理列表。
  - 商品管理列表：每個商品卡片有「編輯」按鈕。
  - 商品編輯頁有「物流設定」按鈕，點擊展開宅配到府/7-ELEVEN/全家等服務開關。
  - 退出編輯頁用 go_back action（history.back() + 等 AX tree 就緒）。
  - go_back 後會回到賣家儀表板，需再次點「商品」tab 才能看到商品列表。

  ⚠️ 本測試分兩輪，缺一不可：
     第一輪（步驟 1-8）：進入商品編輯 → 展開物流設定 → screenshot_analyze 記錄狀態A
     第二輪（步驟 9-17）：go_back 退出 → 再次進入商品編輯 → 展開物流設定 → screenshot_analyze 記錄狀態B → done=true
  ⚠️ 唯一允許 done=true 的位置是步驟 17，其他任何步驟都不能 done=true。
  ⚠️ 步驟 6 展開物流設定≠完成，必須繼續執行步驟 7-17。

  步驟（全部 17 步必須依序執行）：
  1. wait 3000
  2. shadow_click role=tab name_regex="^商品$"
  3. wait 2500
  4. shadow_click role=button name_regex="^編輯$"
  5. wait 4000
  6. shadow_click role=button name_regex="^物流設定$"
  7. wait 1500
  8. screenshot_analyze "【第一輪/狀態A】記錄：宅配到府、7-ELEVEN、全家 的開關是開還是關？"
  9. go_back wait=2500
  10. shadow_click role=tab name_regex="^商品$"
  11. wait 2500
  12. shadow_click role=button name_regex="^編輯$"
  13. wait 4000
  14. shadow_click role=button name_regex="^物流設定$"
  15. wait 1500
  16. screenshot_analyze "【第二輪/狀態B】記錄：宅配到府、7-ELEVEN、全家 的開關是開還是關？與步驟8狀態A相同嗎？"
  17. done=true

  ⚠️ 步驟 8 的 screenshot_analyze 是第一輪結束點，嚴禁步驟 8 前 done=true。
  ⚠️ 步驟 9 用 go_back（非 goto），go_back 自動等 AX tree 就緒後才返回。
  ⚠️ 步驟 16 的 screenshot_analyze 是第二輪結束點，嚴禁步驟 16 前 done=true。

success_criteria:
  - "成功兩次進入商品編輯頁並展開物流設定"
  - "狀態A（取消前）和狀態B（重新開啟後）的物流服務開關狀態一致（Bug #5 regression PASS）"
  - "不出現「未儲存的修改值」殘留（go_back 後重新開啟 = 原始儲存狀態）"

tags: [regression, product, pickup, checkboxes, agora, critical, issue-70]
