id: agora_pickup_checkboxes_restore
name: "AgoraMarket 商品編輯取消後物流設定還原驗證 (Issue #70 #5)"
url: "https://redandan.github.io/?__test_role=seller"

max_iterations: 30
timeout_secs: 480

# Seller 後台是 H5 手機版，與 Buyer 相同 viewport
viewport:
  width: 390
  height: 844
  scale: 2.0
  mobile: true

locale: zh-TW

# Hard-won pickup-flow lessons auto-injected when KB_ENABLED=1.  Covers
# Flutter 商品/編輯/物流設定 navigation, animation timing, five 物流
# service names, infra traps already worked-around by Sirin runtime.
kb_refs:
  - agora-pickup-flow

goal: |
  目標：驗證商品編輯物流設定（delivery service switches）取消後能正確還原（Issue #70 Bug #5）。
  修復前的 bug：取消編輯後重新開啟商品，switches 仍顯示未儲存的修改值。

  起始狀態：以賣家身份登入，已在賣家儀表板首頁（URL auto-login via __test_role=seller）。

  已知資訊（嚴格遵守）：
  - 賣家首頁是儀表板，不是商品列表。必須點底部「商品」tab 才能進入商品管理列表。
  - 商品管理列表：每個商品卡片有「編輯」按鈕。
  - 商品編輯頁有「物流設定」按鈕，點擊展開宅配到府/7-ELEVEN/全家等服務開關。
  - 退出編輯頁用 eval window.history.back() + wait_for_ax_ready
    （go_back 在 hash route 下偶爾跳 about:blank，改用 JS history.back() 較穩）。
  - 退出後會回到賣家儀表板，需再次點「商品」tab 才能看到商品列表。

  ⚠️ 本測試分兩輪，缺一不可：
     第一輪（步驟 1-15）：進入商品編輯 → 展開物流設定 → screenshot_analyze 記錄狀態A
     第二輪（步驟 16-28）：goto 回商品列表 → 再次進入商品編輯 → 展開物流設定 → screenshot_analyze 記錄狀態B → done=true
  ⚠️ 唯一允許 done=true 的位置是步驟 28，其他任何步驟都不能 done=true。
  ⚠️ 步驟 13 展開物流設定≠完成，必須繼續執行步驟 14-28。
  ⚠️ Flutter tab 切換後必須重新呼叫 enable_a11y 才能繼續 shadow_click。

  步驟（全部依序執行）：
  1. wait 3000
  2. enable_a11y
  3. wait 1500
  4. shadow_click role=tab name_regex="^商品$"（切換到商品管理列表）
  5. wait 2500
  6. enable_a11y（Flutter 路由切換後必須重新啟動語義樹）
  7. wait 1500
  8. shadow_click role=button name_regex="^編輯$"
  9. wait 4000
  10. enable_a11y
  11. wait 1500
  12. flutter_scroll_until_visible role=button name_regex="物流設定"（捲動到按鈕可見）
  13. shadow_click role=button name_regex="^物流設定$"（展開物流設定）
  14. wait 1500
  15. screenshot_analyze "【第一輪/狀態A】記錄：宅配到府、7-ELEVEN、全家 的開關是開還是關？"
  16. goto target="https://redandan.github.io/?__test_role=seller#/seller/products"
  17. wait 3000
  18. enable_a11y
  19. wait 1500
  20. shadow_click role=button name_regex="^編輯$"
  21. wait 4000
  22. enable_a11y
  23. wait 1500
  24. flutter_scroll_until_visible role=button name_regex="物流設定"（捲動到按鈕可見）
  25. shadow_click role=button name_regex="^物流設定$"（展開物流設定）
  26. wait 1500
  27. screenshot_analyze "【第二輪/狀態B】記錄：宅配到府、7-ELEVEN、全家 的開關是開還是關？與步驟15狀態A相同嗎？（Bug #5 驗證）"
  28. done=true

  ⚠️ 步驟 15 的 screenshot_analyze 是第一輪結束點，嚴禁步驟 15 前 done=true。
  ⚠️ 步驟 27 的 screenshot_analyze 是第二輪結束點，嚴禁步驟 27 前 done=true。
  ⚠️ 唯一允許 done=true 的位置是步驟 28，其他任何步驟都不能 done=true。

success_criteria:
  - "成功兩次進入商品編輯頁並展開物流設定"
  - "狀態A（取消前）和狀態B（重新開啟後）的物流服務開關狀態一致（Bug #5 regression PASS）"
  - "不出現「未儲存的修改值」殘留（go_back 後重新開啟 = 原始儲存狀態）"

tags: [regression, product, pickup, checkboxes, agora, critical, issue-70]


