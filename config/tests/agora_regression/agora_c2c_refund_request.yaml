id: agora_c2c_refund_request
name: "C2C 後段流程：買家申請退款/退貨"
url: "https://redandan.github.io/?__test_role=buyer"

max_iterations: 20
timeout_secs: 300

viewport:
  width: 390
  height: 844
  scale: 2.0
  mobile: true

locale: zh-TW

goal: |
  目標：驗證買家訂單頁存在退款入口，記錄退款相關 UI。

  ⚠️ 線性流程，每步只做一件事，嚴禁重複呼叫 shadow_dump。
  ⚠️ 步驟 14 無條件 done=true，嚴禁提早終止。
  ⚠️ 若任何 shadow_click 找不到目標，繼續往下執行，不要重試。

  步驟（線性，步驟 14 done=true）：
  1. goto target="https://redandan.github.io/?__test_role=buyer#/orders"（買家訂單頁）
  2. wait 5000（等 auto-login + 頁面載入）
  3. enable_a11y
  4. wait 2000
  5. shadow_dump（列出訂單列表和各訂單按鈕 — 只呼叫一次）
  6. shadow_click role=button name_regex="退款|退貨|取消|Refund|Cancel|申請|退貨退款"（尋找退款入口，找不到就繼續）
  7. wait 2000
  8. enable_a11y
  9. wait 1000
  10. shadow_dump（列出退款表單內容 — 只呼叫一次）
  11. scroll y=300（查看更多退款選項）
  12. wait 1000
  13. shadow_dump（確認完整退款 UI — 只呼叫一次）
  14. done=true

success_criteria:
  - "成功進入買家訂單頁"
  - "shadow_dump 成功執行並記錄訂單列表"
  - "記錄退款入口是否存在（找到或找不到均合格）"

tags: [c2c, buyer, refund, cancel, regression, issue-185]

