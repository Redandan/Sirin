id: agora_notification_delete
name: "AgoraMarket 通知刪除修復驗證 (Issue #70 #2)"
url: "https://redandan.github.io/?__test_role=buyer"

browser_headless: false
max_iterations: 20
timeout_secs: 300

goal: |
  目標：驗證 AgoraMarket 通知刪除功能（Issue #70 Critical Bug #2）。

  起始狀態：以買家身份登入，已在首頁（URL auto-login via __test_role=buyer）。

  ✅ 已確認 AX tree 資訊：
  - 通知入口：role=button name="訊息"（頂部右側圖示按鈕）
  - 首頁頂部有 button:訊息 可以直接 shadow_click

  ⚠️ Flutter CanvasKit app：所有 UI 判斷用 screenshot_analyze。
  ⚠️ 嚴禁提早終止：必須執行完所有步驟才能 done=true。

  步驟（按順序執行，不跳過）：
  1. screenshot_analyze "確認在首頁，頂部右側看到哪些按鈕圖示？"
  2. shadow_click role=button name_regex="訊息|通知|Notification"（點擊訊息/通知中心）
  3. wait 3000（等待 Flutter 頁面載入）
  4. screenshot_analyze "是否在通知/訊息列表頁？看到哪些通知項目？列表是空的嗎？"
  5. shadow_dump（列出通知項目和可用操作按鈕）
  6. shadow_click role=button name_regex="刪除|Delete|移除|清除|全部已讀|×|✕"（嘗試刪除通知）
  7. wait 1500
  8. screenshot_analyze "刪除操作後的狀態？通知消失、確認彈窗、或無刪除功能？"
  9. done=true

  ⚠️ 必須完整執行步驟 1-9，嚴禁在步驟 4 前 done=true。
  ⚠️ 步驟 6 若找不到刪除按鈕（空通知列表或無刪除 UI），繼續執行步驟 7-9。

success_criteria:
  - "通知中心頁面可以正常開啟"
  - "通知列表顯示正常（有通知或空狀態皆合格）"
  - "若有通知，嘗試刪除後記錄結果（消失、需確認、或刪除 UI 缺失）"

tags: [regression, notification, agora, critical, issue-70]
