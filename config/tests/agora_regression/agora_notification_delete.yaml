id: agora_notification_delete
name: "AgoraMarket 通知刪除修復驗證 (Issue #70 #2)"
url: "https://redandan.github.io/?__test_role=buyer"

browser_headless: false
max_iterations: 20
timeout_secs: 240

goal: |
  目標：驗證 AgoraMarket 通知刪除功能（Issue #70 Critical Bug #2）。

  起始狀態：以買家身份登入，已在首頁（URL auto-login via __test_role=buyer）。

  ⚠️ Flutter CanvasKit app：所有 UI 判斷用 screenshot_analyze。

  步驟：
  1. screenshot_analyze "確認在首頁，找頂部通知鈴鐺圖示"
  2. 方法 A：shadow_click role=button name_regex="通知|Notification|bell|鈴|消息|訊息"
  3. 方法 B（若 A 失敗）：shadow_click role=tab name_regex="^我的$"，
     wait 1500，再 shadow_click role=button name_regex="通知|Notification"
  4. wait 2000 → screenshot_analyze "是否在通知列表頁？有通知項目嗎？"

  判斷（立即做，不要超過 2 個 iteration 找通知）：
  - 通知列表為空（無通知）→ done=true（合法狀態，顯示無通知，pass）
  - 有通知 → screenshot_analyze "看到刪除圖標（垃圾桶/X）或滑動刪除提示嗎？"
    - 有刪除圖標：shadow_click role=button name_regex="刪除|Delete|移除|×|✕|清除"
      wait 1500 → screenshot_analyze "通知是否消失？" → done=true
    - 無刪除圖標：記錄「delete UI 不可見，可能需要側滑」→ done=true
  - 找不到通知入口（2 次嘗試後）→ screenshot_analyze 記錄 → done=true

success_criteria:
  - "通知中心頁面可以正常開啟"
  - "通知列表顯示正常（有通知或空狀態）"
  - "若有通知，刪除操作後通知消失（或記錄刪除 UI 缺失）"

tags: [regression, notification, agora, critical, issue-70]
