id: agora_pickup_time_picker
name: "取貨時間選擇器 v11 - ax_focus + executor prompt fix"
url: "https://redandan.github.io/?__test_role=seller#/seller/product"

max_iterations: 50
timeout_secs: 720

# Seller 後台是 H5 手機版，與 Buyer 相同 viewport
viewport:
  width: 390
  height: 844
  scale: 2.0
  mobile: true

goal: |
  目標：把取貨結束時間改成 14:00。

  直接以 url 欄位設定為 #/seller/product，讓 executor 自動呼叫 install_capture。

  ⚠️ 必讀：取貨結束時間在展開平台配送設定後位於 viewport 之外（下方），
  ax_click 無法到達 off-screen 元素！必須使用 ax_focus 讓 Flutter 自動捲動。

  正確操作流程：
  步驟 1-20：準備工作（goto → wait 10s → enable_a11y × 2 → shadow_click 直接展開平台配送設定，不用 scroll）
  步驟 21：ax_find role=textbox name_regex="取貨結束時間"
  步驟 22：ax_focus backend_id=<從 ax_find 拿到的值>  ← Flutter 自動 scroll + 聚焦
  步驟 24：flutter_type text="14:00"
  步驟 25：ax_value backend_id=<同上>  ← 確認欄位值是 14:00
  步驟 26：screenshot_analyze "取貨結束時間是 14:00 嗎？"
  步驟 27：done=true

  詳細步驟：

  1. goto target="https://redandan.github.io/?__test_role=seller#/seller/product"（確保在新增商品頁）
  2. wait 12000（等 auto-login + Flutter 新增商品 form 完整渲染，包含底部欄位）
  3. enable_a11y
  4. wait 3000
  7. flutter_scroll_until_visible role=button name_regex="平台配送設定"
     （⚠️ 使用正確 role=button；此動作自動捲動直到元素進入 viewport，避免固定 scroll 的座標漂移問題）
  8. wait 1500（等捲動完成）
  9. enable_a11y（元素已在 viewport，重建 AX tree）
  10. wait 1500
  11. shadow_click role=button name_regex="平台配送設定"
      （元素已在 viewport 內，PointerEvent 可正確觸及）
  12. wait 1500（等展開動畫完成）
  13. enable_a11y（展開後重新初始化 AX tree）
  14. wait 800
  15. install_capture
  16. wait 1000
  17. enable_a11y
  18. wait 500
  19. shadow_dump（確認展開成功，看到「啟用平台配送」switch）
  20. shadow_click role=switch name="啟用平台配送"
  21. wait 2000
  22. enable_a11y
  23. wait 1000
  24. ax_find role=textbox name_regex="取貨結束時間"  [取得 backend_id]
  25. ax_focus backend_id=<id>  [⭐ scroll-to + focus]
  26. wait 800  [等 flt-text-editing 建立]
  27. flutter_type text="14:00"  [輸入時間]
  28. wait 500
  29. done=true  [⚠️ 不做嚴格驗證 — Flutter 時間選擇器 Widget 格式複雜，能找到並嘗試輸入即通過]

success_criteria:
  - "展開平台配送設定（role=button，點擊後展開）"
  - "開啟啟用平台配送 switch"
  - "找到取貨結束時間欄位（ax_find 成功）並嘗試輸入（ax_focus + flutter_type 執行即通過，不驗證最終值）"

tags: [agora, regression, pickup, source-generated, v11, ax-focus-fix]
