id: agora_pickup_time_picker
name: "取貨時間選擇器 v9 - direct goto form URL"
url: "https://redandan.github.io/?__test_role=seller#/seller/product"

max_iterations: 35
timeout_secs: 480

goal: |
  目標：把取貨結束時間改成 14:00。

  直接以 url 欄位設定為 #/seller/product，讓 executor 自動呼叫 install_capture。
  避免 shadow_click 觸發 hash-route TargetInfoChanged 競態 crash。

  步驟：

  1. wait 8000
  2. enable_a11y
  3. wait 2000
  4. enable_a11y
  5. shadow_dump — 確認在新增商品 form（看到 button:返回 或 group 等 form 元素）
  6. scroll y=800
  7. wait 1000
  8. enable_a11y
  9. shadow_find role=button name="平台配送設定"
  10. shadow_click role=button name="平台配送設定"
  11. install_capture
  12. wait 2000
  13. enable_a11y
  14. wait 1000
  15. shadow_dump
  16. shadow_click role=switch name="啟用平台配送"
  17. wait 2000
  18. enable_a11y
  19. wait 1000
  20. ax_find role=textbox name_regex="取貨結束時間"
  21. ax_click
  22. wait 500
  23. flutter_type text="14:00"
  24. wait 500
  25. flutter_enter
  26. wait 1000
  27. screenshot_analyze "取貨結束時間是 14:00 嗎？"
  28. done=true

success_criteria:
  - "展開平台配送設定"
  - "開啟啟用平台配送 switch"
  - "取貨結束時間改為 14:00"

tags: [agora, regression, pickup, source-generated, v9, direct-goto]
