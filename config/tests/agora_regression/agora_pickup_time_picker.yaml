id: agora_pickup_time_picker
name: "取貨時間選擇器 v11 - ax_focus + executor prompt fix"
url: "https://redandan.github.io/?__test_role=seller#/seller/product"

max_iterations: 30
timeout_secs: 480

# Seller 後台是 PC 桌面版，使用標準桌面 viewport
viewport:
  width: 1280
  height: 900
  scale: 1.0
  mobile: false

goal: |
  目標：把取貨結束時間改成 14:00。

  直接以 url 欄位設定為 #/seller/product，讓 executor 自動呼叫 install_capture。

  ⚠️ 必讀：取貨結束時間在展開平台配送設定後位於 viewport 之外（下方），
  ax_click 無法到達 off-screen 元素！必須使用 ax_focus 讓 Flutter 自動捲動。

  正確操作流程：
  步驟 1-19：準備工作（wait、enable_a11y、展開平台配送設定、啟用 switch）
  步驟 20：ax_find role=textbox name_regex="取貨結束時間"
  步驟 21：ax_focus backend_id=<從 ax_find 拿到的值>  ← Flutter 自動 scroll + 聚焦
  步驟 22：flutter_type text="14:00"
  步驟 23：ax_value backend_id=<同上>  ← 確認欄位值是 14:00
  步驟 24：screenshot_analyze "取貨結束時間是 14:00 嗎？"
  步驟 25：done=true

  詳細步驟：

  1. wait 8000
  2. enable_a11y
  3. wait 2000
  4. enable_a11y
  5. shadow_dump — 確認在新增商品 form
  6. flutter_scroll y=800
     （Flutter canvas 需要 touch-drag scroll，window.scrollBy 無效）
  7. wait 1000
  8. enable_a11y
  9. shadow_find role=button name="平台配送設定"
  10. shadow_click role=button name="平台配送設定"
  11. install_capture
  12. wait 2000
  13. enable_a11y
  14. wait 1000
  15. shadow_dump
  16. shadow_click role=switch name="啟用平台配送"
  17. wait 2000
  18. enable_a11y
  19. wait 1000
  20. ax_find role=textbox name_regex="取貨結束時間"  [取得 backend_id]
  21. ax_focus backend_id=<id>  [⭐ scroll-to + focus，不是 ax_click，不是 click_point]
  21b. wait 500  [等 flt-text-editing 建立]
  22. flutter_type text="14:00"  [此時 flt-text-editing 已存在，會先清除再輸入]
  23. ax_value backend_id=<id>  [驗證：應該是 "14:00"]
  24. screenshot_analyze "取貨結束時間是 14:00 嗎？"
  25. done=true

success_criteria:
  - "展開平台配送設定"
  - "開啟啟用平台配送 switch"
  - "取貨結束時間改為 14:00"

tags: [agora, regression, pickup, source-generated, v11, ax-focus-fix]
