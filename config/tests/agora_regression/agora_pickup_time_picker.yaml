id: agora_pickup_time_picker
name: "取貨時間選擇器 v11 - ax_focus + executor prompt fix"
url: "https://redandan.github.io/?__test_role=seller#/seller/product"

max_iterations: 35
timeout_secs: 600

# Seller 後台是 H5 手機版，與 Buyer 相同 viewport
viewport:
  width: 390
  height: 844
  scale: 2.0
  mobile: true

goal: |
  目標：把取貨結束時間改成 14:00。

  直接以 url 欄位設定為 #/seller/product，讓 executor 自動呼叫 install_capture。

  ⚠️ 必讀：取貨結束時間在展開平台配送設定後位於 viewport 之外（下方），
  ax_click 無法到達 off-screen 元素！必須使用 ax_focus 讓 Flutter 自動捲動。

  正確操作流程：
  步驟 1-20：準備工作（goto → wait 10s → enable_a11y × 2 → shadow_click 直接展開平台配送設定，不用 scroll）
  步驟 21：ax_find role=textbox name_regex="取貨結束時間"
  步驟 22：ax_focus backend_id=<從 ax_find 拿到的值>  ← Flutter 自動 scroll + 聚焦
  步驟 24：flutter_type text="14:00"
  步驟 25：ax_value backend_id=<同上>  ← 確認欄位值是 14:00
  步驟 26：screenshot_analyze "取貨結束時間是 14:00 嗎？"
  步驟 27：done=true

  詳細步驟：

  1. goto target="https://redandan.github.io/?__test_role=seller#/seller/product"（確保在新增商品頁）
  2. wait 10000（等 auto-login + Flutter 新增商品 form【完整】渲染，包含底部欄位）
  3. enable_a11y
  4. wait 3000（Flutter form 有大量欄位，AX tree 建構需時）
  5. enable_a11y（二次確保，不用 scroll — AX tree 已包含 off-screen 元素）
  6. wait 2000
  7. shadow_dump（確認 AX tree 已有「平台配送設定」button）
  8. shadow_click role=button name_regex="平台配送設定"
     （⚠️ 已確認：platform delivery 是 role=button 非 group；不需 scroll，shadow_dump 無捲動即可見）
  9. wait 1500（等展開動畫完成）
  10. enable_a11y（展開後重新初始化 AX tree）
  11. wait 800
  12. install_capture
  13. wait 1000
  14. enable_a11y
  15. wait 500
  16. shadow_dump（確認展開成功，看到「啟用平台配送」switch）
  17. shadow_click role=switch name="啟用平台配送"
  18. wait 2000
  19. enable_a11y
  20. wait 1000
  21. ax_find role=textbox name_regex="取貨結束時間"  [取得 backend_id]
  22. ax_focus backend_id=<id>  [⭐ scroll-to + focus]
  23. wait 500  [等 flt-text-editing 建立]
  24. flutter_type text="14:00"
  25. ax_value backend_id=<id>  [驗證：應該是 "14:00"]
  26. screenshot_analyze "取貨結束時間是 14:00 嗎？"
  27. done=true

success_criteria:
  - "展開平台配送設定（ExpansionTile，role=group）"
  - "開啟啟用平台配送 switch"
  - "取貨結束時間改為 14:00"

tags: [agora, regression, pickup, source-generated, v11, ax-focus-fix]
