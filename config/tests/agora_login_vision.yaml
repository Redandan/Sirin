id: agora_login_vision
name: "AgoraMarket 登入流程 — vision perception (Flutter Canvas)"
url: "https://agoramarket.purrtechllc.com/#/login"

max_iterations: 20
timeout_secs: 300
# H5 mobile viewport — AgoraMarket 會員端是手機版 App，必須用手機 viewport 測試
viewport:
  width: 390
  height: 844
  scale: 2.0
  mobile: true
max_retries: 1  # H5 Flutter 偶發 Chrome 初始化延遲，自動重試一次
retry_on_parse_error: 5

perception: vision

fixture:
  setup:
    - {action: "clear_state"}
    - {action: "goto", target: "https://agoramarket.purrtechllc.com/#/login"}
    - {action: "wait", target: "4000"}
  cleanup:
    - {action: "clear_state"}

# Default Chrome viewport is now 1440×1600 at engine level (browser.rs),
# so the full login page — including the bottom test-account grid — is
# in-frame on turn 1.  No set_viewport workaround needed.
goal: |
  Sign in as the Test Buyer.

  Look at the screenshot.  There is a grid of four buttons at the BOTTOM
  of the login form:
    [測試買家]  [測試賣家]
    [測試送貨員] [測試管理員]

  Click the "測試買家" button (top-left of that grid).  It auto-fills a
  test account via JavaScript and submits, so the URL hash will leave
  #/login within ~2 seconds.

  Emit: {"action": "click_point", "x": <center_x>, "y": <center_y>}
  Coordinates come from the screenshot.  Set done=true once URL hash is
  no longer #/login.

  ⚠️ The correct button says exactly "測試買家".  Do NOT click any of:
    - "使用 Google 帳戶登入"
    - "使用 Telegram 登入"
    - "連接錢包"
    - "測試賣家" / "測試送貨員" / "測試管理員" (siblings, wrong role)

  STRICT JSON output.  No markdown fences.

success_criteria:
  - "URL hash leaves #/login (navigates to home / market / dashboard)"

tags: [agora, login, flutter, canvas, vision, regression]


