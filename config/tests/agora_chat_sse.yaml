id: agora_chat_sse
name: "AgoraMarket 智能客服 SSE 即時訊息驗證"
url: "https://agoramarket.purrtechllc.com"
browser_headless: false
max_iterations: 15
timeout_secs: 270
# NOTE (2026-04-20): claude_cli hang fixed in commit 908bb75 — compact prompt
# keeps payload under 3 KB.  Re-enabled below.
llm_backend: claude_cli
goal: |
  ⚠️ Flutter CanvasKit app：DOM 為空，所有 UI 狀態判斷必須用 screenshot_analyze 或 ax_* 動作。
  驗證 AgoraMarket 智能客服聊天功能的即時訊息顯示（Issue #9 回歸）。

  【測試帳號】username: buyer, password: test123
  【登入方式】ax_find role=button name=測試買家 → ax_click（需先 set_viewport 1280×1600 + semantics bootstrap）

  步驟：
  0. set_viewport width=1280 height=1600；等 5 秒；
     eval "document.querySelector('flt-semantics-placeholder')?.click()"；等 3 秒。
  1. ax_find role=button name=測試買家 → ax_click 登入。登入後等 3 秒，再執行一次 semantics bootstrap。
  2. 登入後，尋找智能客服/客服諮詢的入口（floating button 或 FAQ/客服頁面）。
     用 ax_find name=客服 或 screenshot_analyze "是否有客服入口 floating button？"
  3. 開啟客服聊天視窗。
  4. 嘗試發送一條訊息（例如「你好」）。
  5. 觀察訊息是否在 3 秒內出現在聊天記錄中，不需手動重整。
     screenshot_analyze "訊息是否已顯示？"
  6. eval 檢查 console 是否有 SSE error：
     eval "JSON.stringify(window.__sseErrors || [])"

success_criteria:
  - "客服聊天入口可以找到並開啟"
  - "發送訊息後 3 秒內在視窗中顯示（不需 reload）"
  - "Console 沒有 Failed to handle new message 或 SSE connection lost 錯誤"

tags: [regression, chat, sse, agora, issue-9]

docs_refs:
  - AgoraMarket/.claude/skills/agora-market-e2e/SKILL.md
  - AgoraMarket/.claude/e2e-reports/TEST_PLAN.md
