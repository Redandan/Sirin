id: agora_chat_sse
name: "AgoraMarket 智能客服 SSE 即時訊息驗證 (Issue #9)"
url: "https://redandan.github.io/"

# Flutter CanvasKit — UI 全部渲染在 canvas 上（WebGL 需要 GPU）
browser_headless: false
max_iterations: 45
timeout_secs: 600
retry_on_parse_error: 2

fixture:
  setup:
    - {action: "clear_state"}
    - {action: "set_viewport", width: 1440, height: 1600}
    - {action: "goto", target: "https://redandan.github.io/"}
    - {action: "enable_a11y"}
  cleanup:
    - {action: "clear_state"}

goal: |
  【Flutter CanvasKit Web 應用測試 — Shadow DOM 方案】

  ⚠️ 重要：這是 Flutter CanvasKit 應用，所有 UI 渲染在 canvas 上。
  使用 shadow_* actions，直接查 flt-semantics-host。

  【Step 1: 登入】
  - shadow_dump（確認在登入頁面）
  - shadow_click role=button name_regex="測試買家"
  - wait 3000
  - enable_a11y
  - shadow_dump（確認在首頁，看到商品/訂單/錢包/我的 tab）

  【Step 2: 導航到「我的」頁面 找客服入口】
  - shadow_click role=tab name_regex="^我的$"
  - wait 2000
  - enable_a11y
  - shadow_dump（確認在我的頁面，尋找「客服」「AI助手」「聯絡」等入口）

  【Step 3: 找到並點擊客服入口】
  分析 shadow_dump 的輸出，尋找客服相關項目：
  - shadow_click role=button name_regex="客服|AI助手|聯絡|Chat|Support|Help|諮詢|訊息中心"
  - wait 2000
  - enable_a11y
  - screenshot_analyze "是否在聊天頁面？看到 AI助手 或輸入框？"

  如果「我的」頁面沒有客服入口，嘗試：
  - 查找 floating button：shadow_find role=button（找底部 floating button）
  - 或切換到其他 tab 再找：shadow_click role=tab name_regex="^商品$"

  【Step 4: 發送測試訊息】
  確認在聊天頁面（AI助手界面）後：
  - ax_find role=textbox（找到「輸入訊息...」輸入框，取得 backend_id）
  - ax_click backend_id=<id>（聚焦輸入框）
  - wait 500
  - flutter_type text="hello"
  - wait 300
  - flutter_enter（Enter key 觸發 Flutter onSubmitted，比找無標籤發送按鈕更可靠）
  - wait 5000（等待 SSE 回覆）
  - enable_a11y（送出後重新 enable）

  【Step 5: 用截圖驗證 SSE（重要！）】
  ⚠️ 聊天訊息不會出現在 shadow_dump/ax_tree，必須用 screenshot_analyze 驗證：
  - screenshot_analyze "聊天記錄中是否出現了 hello 訊息？或有 AI 自動回覆？4 秒內有新訊息嗎？"

  判斷標準（看截圖即可，不要 shadow_dump）：
  a) 截圖顯示 "hello" 在聊天記錄中 → ✅ 立即 done=true
  b) 截圖顯示 AI 自動回覆出現 → ✅ 立即 done=true（SSE 正常）
  c) 截圖顯示聊天界面正常且訊息已送出（輸入框清空）→ ✅ done=true

  可選：eval "JSON.stringify(window.__sseErrors || [])" 確認無 SSE console 錯誤

  【重要注意事項】
  - flutter_type text="hello"（只能輸入 ASCII，不能輸入中文）
  - ⚠️ flutter_type 後必須 enable_a11y，否則 shadow_ready=false
  - ⚠️ 聊天訊息不在 flt-semantics 樹，用 screenshot_analyze 而非 shadow_dump 驗證
  - ⚠️ 看到聊天界面正常 + 訊息送出後，立即 done=true，不要繼續循環
  - 每次路由切換後必須重新 enable_a11y
  - 如果 shadow_ready=false，等 1000ms 再 enable_a11y（最多 2 次後放棄，改用截圖）

success_criteria:
  - "成功登入（看到錢包/商品/訂單/我的 tab）"
  - "找到客服入口（AI助手）並成功開啟聊天視窗"
  - "輸入 hello 並發送，4 秒內在聊天記錄中顯示（截圖確認）"
  - "無嚴重 SSE 錯誤（console 無 Failed to handle new message）"

tags: [regression, chat, sse, agora, issue-9]
