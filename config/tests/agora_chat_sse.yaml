id: agora_chat_sse
name: "AgoraMarket 智能客服 SSE 即時訊息驗證"
url: "https://agoramarket.purrtechllc.com"

# Flutter CanvasKit — UI 全部渲染在 canvas 上（WebGL 需要 GPU）
browser_headless: false
max_iterations: 25
timeout_secs: 480
# NOTE: claude_cli causes 600s hang on large ReAct prompts — using Gemini default
# llm_backend: claude_cli

goal: |
  驗證 AgoraMarket 智能客服聊天功能的即時訊息顯示（Issue #9 回歸）。

  ⚠️ Flutter CanvasKit 操作規則（必須遵守）：
  - CSS selector / click "文字" / type selector 對 canvas 無效
  - 必須 enable_a11y → ax_find → ax_click / ax_type 的順序
  - 路由切換後 AX tree 短暫 collapse → 需再次 enable_a11y（等 1-2 秒後）
  - ax_find 回傳空 = 未 enable_a11y 或樹在 collapse 中，重試 enable_a11y 再找

  【測試帳號】username: buyer, password: test123
  【快速登入】若看到「測試買家」按鈕可直接 ax_click（不用輸入密碼）

  步驟：

  0. [準備]
     clear_state（清除前次測試殘留 session，防止跨測試污染）
     set_viewport width=1280 height=1600
     wait 8000（production Flutter 初始化比 test site 慢）
     enable_a11y
     ax_tree（確認節點 > 1，若仍只有 1 個節點再等 3 秒重試）
     screenshot_analyze "頁面載入狀態？看到什麼頁面？是否有登入按鈕或直接看到主頁？"

  1. [登入]
     enable_a11y
     ax_find role=button name=測試買家（快速登入按鈕）
     若找到：ax_click backend_id=<id>
     若找不到：
       ax_find role=textbox name=username（或帳號欄位）
       ax_type backend_id=<id> text=buyer
       ax_find role=textbox name=password
       ax_type backend_id=<id> text=test123
       ax_find name=登入
       ax_click backend_id=<id>
     wait 3000
     enable_a11y（路由切換後重啟 semantics）
     screenshot_analyze "登入成功？看到主頁面？"

  2. [找客服入口]
     screenshot_analyze "智能客服/客服諮詢入口在哪裡？floating button？客服頁面？"
     enable_a11y
     ax_tree（找客服相關節點）
     ax_find name=客服（或 name=Chat 或 name=諮詢 或 name=support）
     ax_click backend_id=<id>
     wait 2000
     enable_a11y
     screenshot_analyze "客服聊天視窗已開啟？可見訊息輸入框？"

  3. [發送訊息]
     enable_a11y
     ax_find role=textbox（訊息輸入框）
     ax_type backend_id=<id> text=你好
     ax_find name=發送（或 name=Send）
     ax_click backend_id=<id>
     wait 3000
     screenshot_analyze "訊息在 3 秒內顯示於聊天記錄中（不需 reload）？"

  4. [驗證 SSE 無 error]
     eval "JSON.stringify(window.__sseErrors || window.__errors || [])"
     console（確認沒有 Failed to handle new message 或 SSE connection lost）

success_criteria:
  - "客服聊天入口可以找到並開啟"
  - "發送訊息後 3 秒內在視窗中顯示（不需 reload）"
  - "Console 沒有 Failed to handle new message 或 SSE connection lost 錯誤"

tags: [regression, chat, sse, agora, issue-9]

