id: agora_login_text
name: "AgoraMarket 登入流程 — text perception (AX baseline)"
url: "https://redandan.github.io/#/login"

browser_headless: false
max_iterations: 10
timeout_secs: 180
retry_on_parse_error: 2

# No perception field → defaults to 'text' (legacy AX-tree observation path).
# Same goal, same URL as agora_login_vision — A/B comparable.

fixture:
  setup:
    - {action: "clear_state"}
    - {action: "goto", target: "https://redandan.github.io/#/login"}
    - {action: "wait", target: "4000"}
    - {action: "enable_a11y"}
  cleanup:
    - {action: "clear_state"}

goal: |
  This is a Flutter CanvasKit login page.  Sign in by clicking the "測試買家"
  (Test Buyer) quick-login button.

  Workflow:
    1. Call enable_a11y (re-bootstrap semantics if a route changed).
    2. Call ax_find with role="button", name_regex="測試買家" to locate the button.
    3. Call ax_click on the returned backend_id.
    4. Wait 2s and re-enable_a11y.
    5. If the URL hash leaves #/login the login succeeded — set done.
    6. If ax_find returns "no match", try a fresh ax_tree to see available
       buttons, then retry.

success_criteria:
  - "URL hash leaves #/login (navigates to home / market / dashboard)"

tags: [agora, login, flutter, canvas, text-baseline]
