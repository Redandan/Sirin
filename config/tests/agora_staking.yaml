id: agora_staking
name: "AgoraMarket Staking 質押功能驗證 (Issue #34)"
url: "https://redandan.github.io/"

# Flutter CanvasKit — UI 全部渲染在 canvas 上（WebGL 需要 GPU）
browser_headless: false
max_iterations: 75
timeout_secs: 700
retry_on_parse_error: 7

goal: |
  驗證 AgoraMarket 質押（Staking）功能（Issue #34）。

  ⚠️ Flutter CanvasKit 操作規則（必須遵守）：
  - CSS selector / click "文字" 對 canvas 無效；必須用 ax_find → ax_click
  - 路由切換後需 enable_a11y（等 1-2 秒）
  - 正確路由：質押頁面 = #/wallet/stake-form（不是 #/stake）
  - 按鈕名稱：「確認質押」「取消質押」（不是「確認」「解質押」）
  - 登入按鈕用 name_regex="^登入$" 精確匹配（避免匹配「使用 Google 登入」）

  【測試帳號】username: buyer, password: test123

  步驟（每步驟盡量 1-2 個 action，避免重複）：

  0. clear_state → goto https://redandan.github.io/ → wait 8000 → enable_a11y

  1. 登入（使用測試捷徑按鈕，最可靠）：
     ax_find name_regex="測試買家" → ax_click → wait 4000
     （若測試買家按鈕不可見，fallback：ax_find name="使用用戶名密碼登入" → ax_click → wait 2000 → enable_a11y
      ax_find role=textbox name=用戶名 → ax_click → ax_type text=buyer
      ax_find role=textbox name=密碼 → ax_click → ax_type text=test123
      ax_find role=button name_regex="^登入$" → ax_click → wait 3000）

  1b. 驗證登入：enable_a11y → screenshot_analyze "URL 是 #/home 或 #/？確認登入成功"

  2. 導航至質押頁面（只用此路由）：
     eval "location.hash='#/wallet/stake-form'" → wait 3000 → enable_a11y
     screenshot_analyze "質押頁面可見？顯示餘額和確認質押按鈕？"

  3. 質押 1 單位：
     ax_find role=textbox name=質押金額 → ax_click → ax_type text=1
     ax_find role=button name=確認質押 → ax_click → wait 3000
     enable_a11y → screenshot_analyze "質押已提交？出現取消質押按鈕？"

  4. 取消質押（解質押）：
     ax_find role=button name=取消質押 → ax_click → wait 1000
     enable_a11y → ax_find role=button name_regex="確認|確定|取消質押" → ax_click → wait 2000
     screenshot_analyze "質押已取消？"

  5. 查看交易記錄：
     eval "location.hash='#/home'" → wait 2000 → enable_a11y
     ax_find name_regex="錢包|Wallet" → ax_click → wait 2000
     screenshot_analyze "錢包頁面可見？交易記錄中有質押/Staking 記錄？"

  完成標準：
  - 登入成功（URL = #/home）
  - 質押頁面顯示餘額（不要求顯示利率，活期質押無固定利率）
  - 質押 1 USDT 成功提交
  - 取消質押成功
  - 錢包頁面有交易記錄
  全部完成才能 done=true。

success_criteria:
  - "質押頁面（#/wallet/stake-form）可正常開啟，無白屏或頁面不存在錯誤"
  - "質押頁面顯示當前可用餘額（USDT 數值）"
  - "質押 1 USDT 成功提交，出現取消質押按鈕"
  - "取消質押成功執行"
  - "錢包交易記錄中可看到質押或取消質押相關記錄"

tags: [staking, agora, issue-34, regression]

