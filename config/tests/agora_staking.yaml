id: agora_staking
name: "AgoraMarket Staking 質押功能驗證 (Issue #34)"
url: "https://redandan.github.io/"

# Flutter CanvasKit — UI 全部渲染在 canvas 上（WebGL 需要 GPU）
browser_headless: false
max_iterations: 8   # ← 進一步降低到 8 (goal 極簡，不應超過 4 步)
timeout_secs: 300   # ← 降低到 5 分鐘
retry_on_parse_error: 2  # 降低重試次數

# P0 優化: 簡化為核心質押流程驗證（登入和導航在 fixture 中完成）
fixture:
  setup:
    - {action: "clear_state"}
    - {action: "set_viewport", width: 375, height: 812}
    - {action: "goto", target: "https://redandan.github.io/"}
    - {action: "wait_for_ax_ready", min_nodes: 20, timeout_ms: 8000}
    # 登入流程在 goal 中省略，假設使用快速登入或已登入
    - {action: "enable_a11y"}
  cleanup:
    - {action: "clear_state"}

goal: |
  【Flutter Canvas Web 應用測試 — 只用 Accessibility Tree】
  
  ⚠️ 重要限制：
  - 不要嘗試用 screenshot_analyze 識別座標（會失敗）
  - 不要嘗試用 DOM selector 定位元素（Canvas 沒有 DOM）
  - 只用 ax_find + ax_click + ax_type，100% 依賴輔助功能樹
  
  【驗收標準：質押 1 USDT】
  
  Step 1: 定位並填寫金額
  - ax_find role=textbox name_regex="質" (找金額輸入框)
  - ax_click + ax_type text=1 (輸入「1」)
  - 重要: 不要假設視覺位置，只用 AXTree 的精確定位
  
  Step 2: 點擊確認按鈕
  - ax_find role=button name_regex="確" (找確認質押按鈕)
  - ax_click (點擊)
  - wait 4000 (等待後端處理)
  
  Step 3: 驗證成功
  - enable_a11y (刷新語義樹)
  - wait_for_ax_ready min_nodes=15 (等待新狀態)
  - ax_find role=button name_regex="取消" (找取消按鈕 = 成功的證據)
  - 若找到 → ✅ 完成
  - 若未找到 → ❌ 質押未成功，停止並報告
  
  【最關鍵的點】
  - AXTree 的 role 和 name 是唯一的真實信息
  - 如果 ax_find 返回「找不到」，說明質押失敗或頁面狀態不對
  - 不要試圖通過視覺來「糾正」— 只信任 AXTree

success_criteria:
  - "質押金額輸入框成功接收「1」作為輸入"
  - "質押確認按鈕被點擊，無驗證錯誤"
  - "質押提交成功，「取消質押」按鈕出現"
  - "整個流程無 console 錯誤或頁面崩潰"

tags: [staking, agora, issue-34, regression]

docs_refs:
  - AgoraMarket/.claude/skills/agora-market-e2e/SKILL.md
  - AgoraMarket/.claude/e2e-reports/TEST_PLAN.md
  - docs/acceptance/issue_34_pledge.md
