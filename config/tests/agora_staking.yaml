id: agora_staking
name: "AgoraMarket Staking 質押功能驗證 (Issue #34)"
url: "https://agoramarket.purrtechllc.com"

browser_headless: false
max_iterations: 25
timeout_secs: 480

# claude_cli backend: compact prompt (last 3 steps, 200-char obs) keeps payload
# under 3 KB, avoiding the 600-s watchdog kill that happened on older runs.
# Gemini is less reliable at step 17+ when context grows.
llm_backend: claude_cli

# Rendering mode: Flutter HTML renderer
# --disable-gpu in browser.rs removes all WebGL → Flutter uses HTML renderer.
# url_query adds flutter-web-renderer=html as belt+suspenders.
url_query:
  flutter-web-renderer: html

goal: |
  驗證 AgoraMarket 質押（Staking）功能完整流程（Issue #34，長期追蹤）。

  ⚠️ 渲染模式：Flutter HTML renderer（--disable-gpu → 無 WebGL → HTML DOM）
     使用 screenshot_analyze 判斷頁面狀態，用 click/type/find 操作 DOM 元素。
     不要使用 ax_find / ax_click（semantics tree 不可用）。

  【測試帳號】username: buyer, password: test123
  【登入頁面】預設顯示電子郵件登入。按「使用用戶名密碼登入」切換到帳密表單。

  執行步驟：

  0. [準備] 等待 Flutter HTML 初始化（頁面載入後再等 3 秒）：
     wait 3000
     screenshot_analyze "頁面載入狀態？是否看到 Agora Market 登入頁面？"

  1. [登入] 切換到帳密登入：
     click "使用用戶名密碼登入" 連結（看起來像藍色文字，在電子郵件輸入框下方）
     wait 1000
     screenshot_analyze "是否看到 username / password 輸入框？"
     type username input → "buyer"
     type password input → "test123"
     click 登入 / Login 按鈕
     wait 3000
     screenshot_analyze "登入是否成功？是否看到主頁面或 dashboard？"

  2. [AC-1] 導航至質押頁面：
     eval "location.hash='#/stake'" 或點擊 Staking/質押 導航連結
     wait 2000
     screenshot_analyze "質押頁面是否載入？利率是否顯示非零、非 N/A 值？可質押餘額是否顯示？"

  3. [AC-1] 確認質押頁面無白屏、無 JS error：
     eval "JSON.stringify(window.__errors || [])"

  4. [AC-2] 輸入有效質押金額（如 1），點擊確認/質押按鈕：
     screenshot_analyze "質押輸入框在哪裡？確認按鈕在哪裡？"
     type 質押金額輸入框 → "1"
     click 確認/質押按鈕
     wait 2000
     screenshot_analyze "是否出現確認對話框或 loading？成功後餘額是否扣款？狀態是否更新為質押中？"

  5. [AC-3] 找到解質押按鈕，點擊確認：
     screenshot_analyze "解質押/Unstake 按鈕在哪裡？"
     click 解質押按鈕
     wait 2000
     screenshot_analyze "是否出現確認對話框？確認後狀態是否更新為已解質押或結算中？"

  6. [AC-4] 導航至質押歷史記錄頁：
     eval "location.hash='#/stake/history'" 或從 UI 找入口
     wait 2000
     screenshot_analyze "是否可見進行中 / 已結算 / 已解質押三種狀態？各記錄是否有金額/日期/利率/狀態？"

  7. [AC-5] 檢視質押金額小數位精度：
     screenshot_analyze "質押金額小數位是否正常？是否有 0.10000000001 / 0.0999999999 類浮點問題？"

success_criteria:
  - "質押頁面可正常開啟，無白屏或錯誤訊息"
  - "質押利率顯示非零、非 N/A、非空白的數值"
  - "質押發起流程完成後餘額扣款正確，狀態顯示質押中或進行中"
  - "解質押按鈕可見可點擊，確認後狀態更新為已解質押或結算中"
  - "質押歷史記錄頁顯示三種狀態：進行中 / 已結算 / 已解質押"
  - "質押金額小數位精度正常，無浮點顯示錯誤"

tags: [staking, agora, issue-34, regression]

docs_refs:
  - AgoraMarket/.claude/skills/agora-market-e2e/SKILL.md
  - AgoraMarket/.claude/e2e-reports/TEST_PLAN.md
  - docs/acceptance/issue_34_pledge.md
