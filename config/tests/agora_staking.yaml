id: agora_staking
name: "AgoraMarket Staking 質押功能驗證 (Issue #34)"
url: "https://redandan.github.io/"

# Flutter CanvasKit — UI 全部渲染在 canvas 上（WebGL 需要 GPU）
browser_headless: false
max_iterations: 75
timeout_secs: 700
retry_on_parse_error: 3  # 降低重試次數 (P0 優化: 更穩定的 goal)

# P0 優化: 添加 fixture.setup 以統一測試環境
fixture:
  setup:
    - {action: "clear_state"}
    - {action: "goto", target: "https://redandan.github.io/"}
    - {action: "set_viewport", width: 375, height: 812}  # ← P0 新增: 設定 H5 視窗尺寸 (解決 viewport mismatch)
    - {action: "wait", target: "2000"}
    - {action: "enable_a11y"}
  cleanup:
    - {action: "clear_state"}

goal: |
  驗證 AgoraMarket 質押（Staking）功能（Issue #34）。

  【系統說明】(P0 優化: 結構化約束)
  - Flutter CanvasKit Web 應用，使用 Accessibility Tree (ax_*) 而非 DOM 選擇器
  - 窗口已設定為 H5 尺寸 (375×812)，UI 元素位置精確
  - 若找不到元素，先執行 enable_a11y，再重試 ax_find

  【帳號資訊】
  - username: buyer, password: test123
  - 捷徑: 若見「測試買家」按鈕，直接 ax_click，跳過登入表單

  【約束清單】(P0 新增: 明確業務邏輯)
  - 質押金額: 1-100 USDT (最小單位 0.01, 預設帳戶餘額 > 1000)
  - 按鈕標籤: 「確認質押」「取消質押」(用 name_regex 精確匹配，避免誤配)
  - 路由清單: 
    * #/home (帳戶首頁)
    * #/wallet/stake-form (質押表單)
  - 成功信號: 質押後「取消質押」按鈕出現 = 質押成功

  【簡化流程】(P0 優化: 移除冗長步驟示例，保留核心邏輯)
  
  1. 登入 → 驗證 URL = #/home
     - ax_find name_regex="測試買家" → ax_click → wait 4000
     - 驗證: URL 應包含 #/home

  2. 導航 → 進入質押頁面
     - eval "location.hash='#/wallet/stake-form'" → wait 2000
     - enable_a11y → ax_find role=textbox name=質押金額 (驗證表單加載)

  3. 質押 1 USDT → 確認提交
     - ax_find role=textbox name=質押金額 → ax_click → ax_type text=1
     - ax_find role=button name=確認質押 → ax_click → wait 3000
     - enable_a11y → ax_find role=button name=取消質押 (出現 = 成功)

  4. 取消質押 → 驗證操作
     - ax_find role=button name=取消質押 → ax_click → wait 1000
     - enable_a11y → ax_find role=button name_regex="確認|確定" → ax_click → wait 2000

  完成標準 (全部滿足):
  - ✅ 登入成功 (URL = #/home)
  - ✅ 質押表單加載 (可見「質押金額」輸入框)
  - ✅ 質押 1 USDT 成功 (「取消質押」按鈕出現)
  - ✅ 取消質押成功 (對話框確認或頁面轉換)

success_criteria:
  - "質押頁面（#/wallet/stake-form）可正常開啟，無白屏或頁面不存在錯誤"
  - "質押頁面顯示當前可用餘額（USDT 數值）"
  - "質押 1 USDT 成功提交，出現取消質押按鈕"
  - "取消質押成功執行"
  - "錢包交易記錄中可看到質押或取消質押相關記錄"

tags: [staking, agora, issue-34, regression]

docs_refs:
  - AgoraMarket/.claude/skills/agora-market-e2e/SKILL.md
  - AgoraMarket/.claude/e2e-reports/TEST_PLAN.md
  - docs/acceptance/issue_34_pledge.md
