id: agora_staking
name: "AgoraMarket Staking 質押功能驗證 (Issue #34)"
url: "https://redandan.github.io/"

# Flutter CanvasKit — UI 全部渲染在 canvas 上（WebGL 需要 GPU）
browser_headless: false
max_iterations: 12  # ← 進一步降低到 12 (goal 簡化後，應該收斂更快)
timeout_secs: 600   # ← 減少超時 (360s → 600s保守估計，通常 3-5 分鐘)
retry_on_parse_error: 2  # 降低重試次數

# P0 優化: 簡化為核心質押流程驗證（登入和導航在 fixture 中完成）
fixture:
  setup:
    - {action: "clear_state"}
    - {action: "set_viewport", width: 375, height: 812}
    - {action: "goto", target: "https://redandan.github.io/"}
    - {action: "wait_for_ax_ready", min_nodes: 20, timeout_ms: 8000}
    # 登入流程在 goal 中省略，假設使用快速登入或已登入
    - {action: "enable_a11y"}
  cleanup:
    - {action: "clear_state"}

goal: |
  用戶已登入並在質押頁面。執行以下單一核心操作：
  
  【質押 1 USDT】
  1. 尋找「質押金額」輸入框 (role=textbox, name_regex="質|金|Amount|Stake")
  2. 點擊該輸入框 (ax_click)
  3. 清空現有內容並輸入「1」(ax_type text=1)
  4. 驗證輸入成功：讀取輸入框值 (ax_value)，應為「1」或「1.00」
  5. 尋找「確認質押」按鈕 (role=button, name_regex="確認|提交|Confirm|Submit" limit=1)
  6. 點擊按鈕 (ax_click)
  7. 等待 4 秒 (wait 4000)
  8. 刷新狀態樹 (enable_a11y)
  9. 等待樹就緒 (wait_for_ax_ready min_nodes=15)
  10. 尋找「取消質押」按鈕 (role=button, name_regex="取消|Unstake|Cancel" limit=1)
  
  【成功標準】
  - 「取消質押」按鈕找到 = 質押成功 ✅
  - 若未找到，檢查是否有錯誤提示（role=alert）

success_criteria:
  - "質押金額輸入框成功接收「1」作為輸入"
  - "質押確認按鈕被點擊，無驗證錯誤"
  - "質押提交成功，「取消質押」按鈕出現"
  - "整個流程無 console 錯誤或頁面崩潰"

tags: [staking, agora, issue-34, regression]

docs_refs:
  - AgoraMarket/.claude/skills/agora-market-e2e/SKILL.md
  - AgoraMarket/.claude/e2e-reports/TEST_PLAN.md
  - docs/acceptance/issue_34_pledge.md
