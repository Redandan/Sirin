id: example_en
name: "English locale example"
url: "https://example.com"
goal: |
  Verify that example.com loads correctly and shows the "Example Domain"
  heading along with the explanatory paragraph.

locale: en
max_iterations: 6
timeout_secs: 60
retry_on_parse_error: 3

success_criteria:
  - "Page displays 'Example Domain' as a heading"
  - "URL is on example.com"

tags: [smoke, docs, en]
