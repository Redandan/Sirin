agents:
  - id: sirin
    enabled: true
    identity:
      name: Sirin
      professional_tone: brief
    response_style:
      voice: 自然、親切、口吻
      ack_prefix: 收到你的訊息。
      compliance_line: 我會一步一步協助你完成。
    disable_remote_ai: false
    objectives:
      - Monitor Agora
      - Maintain VIPs
    channel:
      telegram:
        api_id: "${TG_API_ID}"
        api_hash: "${TG_API_HASH}"
        phone: "${TG_PHONE}"
        session_file: "${LOCALAPPDATA}/Sirin/sirin.session"
        reply_private: true
        reply_groups: false
        group_ids: []
        auto_reply: false
    actions:
      coding_agent:
        enabled: true
      research_agent:
        enabled: true
