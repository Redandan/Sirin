agents:
- id: assistant_1
  enabled: true
  identity:
    name: 助手1
    professional_tone: brief
  response_style:
    voice: 自然、親切、口吻
    ack_prefix: 收到你的訊息。
    compliance_line: 我會一步一步協助你完成。
  channel:
    telegram:
      api_id: ${TG_API_ID}
      api_hash: ${TG_API_HASH}
      phone: ${TG_PHONE}
      session_file: data/sessions/assistant_1.session
      reply_private: true
      reply_groups: false
      group_ids: []
      auto_reply: false
      require_confirmation: false
  disabled_skills: []
  disable_remote_ai: false
  objectives:
  - Monitor Agora
  - Maintain VIPs
  human_behavior:
    enabled: false
    min_reply_delay_secs: 30
    max_reply_delay_secs: 180
    max_messages_per_hour: 20
    max_messages_per_day: 100
  kpi:
    metrics:
    - key: conversion_rate
      label: 轉化率
      unit: '%'
      source: manual
    - key: merchants_contacted
      label: 本月商戶聯繫
      unit: 次
      source: manual
    - key: followups_done
      label: 成功跟進
      unit: 次
      source: manual
- id: assistant_2
  enabled: false
  memory_policy:
    trusted_senders:
      - assistant_1
  identity:
    name: 助手2
    professional_tone: brief
  response_style:
    voice: 專業、簡潔
    ack_prefix: 已收到。
    compliance_line: 我會協助處理。
  channel:
    teams:
      webhook_url: ${TEAMS_WEBHOOK_URL}
  disabled_skills: []
  disable_remote_ai: false
  objectives:
  - Handle colleague queries
  - Draft professional replies
  human_behavior:
    enabled: true
    min_reply_delay_secs: 60
    max_reply_delay_secs: 300
    max_messages_per_hour: 10
    max_messages_per_day: 50
    work_schedule:
      utc_offset_hours: 8
      work_start: 09:00
      work_end: 18:00
      work_days:
      - 1
      - 2
      - 3
      - 4
      - 5
      breaks:
      - name: 午休
        start: 12:00
        end: 13:30
  kpi:
    metrics:
    - key: queries_handled
      label: 處理查詢數
      unit: 次
      source: manual
    - key: avg_response_time
      label: 平均回覆時間
      unit: 分鐘
      source: manual
- id: claude-code
  enabled: true
  identity:
    name: Claude
    professional_tone: brief
  response_style:
    voice: 清晰、直接、專業
    ack_prefix: ''
    compliance_line: ''
  disabled_skills: []
  disable_remote_ai: false
  objectives: []
  llm_override:
    backend: anthropic
    model: claude-sonnet-4-6
    api_key_env: ANTHROPIC_API_KEY
max_agents: 3
