[package]
name = "sirin"
version = "0.1.0"
edition = "2021"
description = "A high-performance desktop AI agent with a macOS System Tray interface"

[dependencies]
tauri = { version = "2.10.3", features = ["tray-icon"] }
tokio = { version = "1.37.0", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.116"
serde_yaml = "0.9.34"
dotenvy = "0.15.7"
chrono = { version = "0.4.38", features = ["serde"] }
grammers-client = "0.9.0"
grammers-session = "0.9.0"
notify-rust = "4.12.0"
reqwest = { version = "0.13.2", default-features = false, features = ["json", "rustls-tls"] }

[build-dependencies]
tauri-build = { version = "2.5.6", features = [] }

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
