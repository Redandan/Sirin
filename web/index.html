<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sirin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!--
  Sirin web UI — single-file HTML.
  Architecture:
    • Alpine.js (CDN) gives us x-data / x-show / x-text reactive bindings.
    • All state lives in `sirin()` factory in app.js (one root x-data scope).
    • Backend calls go through fetch() to /api/snapshot (poll) and /mcp
      (action). No build step, no transpilation — F5 reloads the whole UI.
  Why Alpine + vanilla over React:
    • One file = whole UI. AI can edit one place to change behavior + DOM.
    • Reactive bindings live next to the markup (`x-text="state.foo"`),
      so the data flow is visually obvious without jumping between files.
    • Zero npm / vite / tsc — instant edit-refresh cycle.
  Design tokens come from style.css (mirrors Sirin's egui theme.rs).
-->

<div x-data="sirin()" x-init="init()" class="app">

  <!-- ── Top status bar (32pt, always visible) ───────────────────────── -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="brand" x-text="'Sirin v' + state.version"></span>
      <span class="dot-group">
        <span class="dot" :class="state.browser_open ? 'dot-ok' : 'dot-bad'"
              :title="'Browser: ' + (state.browser_open ? 'running' : 'stopped')"></span>
        <span class="dot-label">Browser</span>
        <span class="dot" :class="state.rpc_running ? 'dot-ok' : 'dot-bad'"
              :title="'RPC: ' + (state.rpc_running ? 'running' : 'stopped')"></span>
        <span class="dot-label">RPC</span>
        <span class="dot" :class="state.tg_connected ? 'dot-ok' : 'dot-bad'"
              :title="'Telegram: ' + (state.tg_connected ? 'connected' : 'offline')"></span>
        <span class="dot-label">TG</span>
      </span>
      <!-- Last verdict — colored by status -->
      <span class="verdict" x-show="state.last_verdict" :class="'verdict-' + state.last_verdict?.status">
        <span x-text="verdictGlyph(state.last_verdict?.status)"></span>
        <span x-text="state.last_verdict?.status?.toUpperCase()"></span>
        <span class="verdict-name" x-text="state.last_verdict?.test_id"></span>
      </span>
    </div>
    <div class="topbar-right">
      <span class="url" x-text="truncateUrl(state.browser_url, 38)" :title="state.browser_url"></span>
      <button class="iconbtn" @click="gearOpen = !gearOpen" title="Settings · Logs · About">⚙</button>
      <button class="iconbtn iconbtn-mono" @click="paletteOpen = true" title="Command palette (Ctrl+K)">⌘K</button>
    </div>
  </header>

  <!-- ── Main split: sidebar + content ───────────────────────────────── -->
  <div class="main">

    <!--
      Sidebar — Linear-inspired labelled nav (default expanded).
      Sections:
        VIEWS    — Dashboard / Testing
        AGENTS   — per-agent workspaces (badges = pending replies)
      Hover on labels reveals subtle bg highlight; active gets accent bar.
    -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-badge">S</div>
        <span class="sidebar-brand">Sirin</span>
      </div>

      <div class="sidebar-section-label">VIEWS</div>
      <button class="nav-row" :class="view === 'dashboard' ? 'active' : ''"
              @click="view = 'dashboard'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-row" :class="view === 'testing' ? 'active' : ''"
              @click="view = 'testing'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="9 11 12 14 22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <span>Testing</span>
      </button>

      <div class="sidebar-section-label">AGENTS</div>
      <template x-for="(agent, i) in state.agents" :key="agent.id">
        <button class="nav-row" :class="view === 'workspace:' + i ? 'active' : ''"
                @click="view = 'workspace:' + i">
          <span class="agent-dot" :class="'agent-' + agent.live_status"></span>
          <span x-text="agent.name"></span>
          <span class="row-spacer"></span>
          <span class="badge-count" x-show="state.pending_counts[agent.id] > 0"
                x-text="state.pending_counts[agent.id]"></span>
        </button>
      </template>
    </aside>

    <!-- Central content -->
    <main class="content">

      <!-- ── Dashboard ─────────────────────────────────────────────── -->
      <section x-show="view === 'dashboard'" class="view">
        <div class="view-header">
          <h1>DASHBOARD</h1>
          <button class="btn-primary" @click="view = 'testing'">▶ Run Test</button>
        </div>
        <hr class="thin-sep">

        <!--
          ACTIVE — Playwright Test UI inspired live run card.
          When a run is in flight: pulsing ▶, big test_id, current step,
          live analysis line, screenshot thumbnail placeholder.
        -->
        <div class="section-label" x-text="'ACTIVE  (' + state.active_runs.length + ')'"></div>
        <template x-if="state.active_runs.length === 0">
          <div class="card card-empty">目前沒有正在執行的測試</div>
        </template>
        <template x-for="run in state.active_runs" :key="run.test_id">
          <div class="card-active card-clickable" @click="view = 'testing'">
            <div class="card-active-body">
              <div class="row gap-md">
                <span class="pulse-dot"></span>
                <span class="card-active-title mono" x-text="run.test_id"></span>
                <span class="badge-soft" x-show="run.step !== null"
                      x-text="'step ' + run.step"></span>
                <span class="row-spacer"></span>
                <span class="dim small">▶ Open trace</span>
              </div>
              <div class="dim small mt-xs" x-show="run.analysis"
                   x-text="truncate(run.analysis, 140)"></div>
            </div>
            <div class="card-active-thumb">
              <span class="dim mono small">live</span>
            </div>
          </div>
        </template>

        <!--
          RECENT — GitHub Actions runs row layout.
          icon · test_id · spacer · duration · time-ago.
          Hover bg + cursor pointer, full row clickable.
        -->
        <div class="section-label"
             x-text="'RECENT  (' + state.recent_runs.length + ' of last 8)'"></div>
        <template x-if="state.recent_runs.length === 0">
          <div class="card card-empty">尚無歷史紀錄</div>
        </template>
        <div class="run-list">
          <template x-for="run in state.recent_runs" :key="run.started_at + run.test_id">
            <button class="run-row" @click="view = 'testing'">
              <span :class="'run-status run-status-' + run.status"
                    x-text="verdictGlyph(run.status)"></span>
              <span :class="'run-status-text run-status-' + run.status"
                    x-text="run.status.toUpperCase()"></span>
              <span class="run-name mono" x-text="run.test_id"></span>
              <span x-show="run.failure_category"
                    class="badge-soft badge-soft-danger"
                    x-text="run.failure_category"></span>
              <span x-show="run.pass_rate !== null && run.pass_rate < 0.7"
                    class="badge-soft badge-soft-warn"
                    x-text="'flaky ' + Math.round(run.pass_rate * 100) + '%'"></span>
              <span class="row-spacer"></span>
              <span class="dim mono small" x-show="run.duration_ms"
                    x-text="(run.duration_ms / 1000).toFixed(1) + 's'"></span>
              <span class="dim small ml-md" x-text="timeAgo(run.started_at)"></span>
            </button>
          </template>
        </div>

        <div class="section-label">COVERAGE</div>
        <div class="card card-clickable" @click="view = 'testing'; testTab = 'coverage'">
          <template x-if="state.coverage">
            <div>
              <div class="row">
                <strong x-text="state.coverage.product"></strong>
                <span class="dim mono small" x-text="'v' + state.coverage.version"></span>
                <span class="row-spacer"></span>
                <span class="link">Open full →</span>
              </div>
              <div class="funnel-row">
                <span class="funnel-label">探索 Discovered</span>
                <span class="funnel-num mono" x-text="state.coverage.discovered"></span>
                <div class="bar"><div class="bar-fill bar-dim"
                     :style="'width:' + funnelPct(state.coverage, 'discovered') + '%'"></div></div>
                <span class="dim mono small" x-text="funnelPct(state.coverage, 'discovered') + '%'"></span>
              </div>
              <template x-if="state.coverage.discovery_status === 'NotRun'">
                <div class="indent dim small italic">(mock — discovery 模組待實作)</div>
              </template>
              <div class="funnel-row">
                <span class="funnel-label">覆蓋 Covered</span>
                <span class="funnel-num mono" x-text="state.coverage.total_covered"></span>
                <div class="bar"><div class="bar-fill bar-accent"
                     :style="'width:' + funnelPct(state.coverage, 'covered') + '%'"></div></div>
                <span class="dim mono small" x-text="funnelPct(state.coverage, 'covered') + '%'"></span>
              </div>
              <div class="funnel-row">
                <span class="funnel-label">有腳本 Scripted</span>
                <span class="funnel-num mono" x-text="state.coverage.scripted"></span>
                <div class="bar"><div class="bar-fill bar-info"
                     :style="'width:' + funnelPct(state.coverage, 'scripted') + '%'"></div></div>
                <span class="dim mono small" x-text="funnelPct(state.coverage, 'scripted') + '%'"></span>
              </div>
            </div>
          </template>
          <template x-if="!state.coverage">
            <div class="dim">Loading coverage…</div>
          </template>
        </div>

        <!--
          BROWSER — Playwright trace viewer inspired card.
          LIVE pulse + url + title + screenshot thumbnail (when /api/browser_screenshot
          is wired in Phase 4 the placeholder swaps to <img>).
        -->
        <div class="section-label">BROWSER</div>
        <div class="card-browser card-clickable" @click="view = 'testing'; testTab = 'browser'">
          <div class="card-browser-meta">
            <div class="row">
              <span :class="state.browser_open ? 'pulse-dot' : 'agent-error'"></span>
              <span class="mono small" :class="state.browser_open ? '' : 'dim'"
                    x-text="state.browser_open ? 'LIVE' : 'OFFLINE'"></span>
              <span class="dim small" x-text="state.browser_title"></span>
            </div>
            <div class="dim mono small mt-xs"
                 x-show="state.browser_url" x-text="state.browser_url"></div>
            <span class="link small mt-xs">Open monitor →</span>
          </div>
          <div class="card-browser-thumb">
            <!-- Phase 4 will swap to <img src="/api/browser_screenshot"> -->
            <span class="dim mono small">screenshot</span>
          </div>
        </div>
      </section>

      <!-- ── Testing (placeholder for Phase 4) ─────────────────────── -->
      <section x-show="view === 'testing'" class="view">
        <div class="view-header">
          <h1>TESTING</h1>
          <span class="dim small">tab: <span x-text="testTab"></span></span>
        </div>
        <hr class="thin-sep">
        <div class="dim">Phase 4 將遷移 Test Runs / Coverage / Browser monitor 三個 sub-tab。</div>
      </section>

      <!-- ── Workspace (placeholder for Phase 6) ─────────────────────── -->
      <section x-show="view.startsWith('workspace:')" class="view">
        <div class="view-header">
          <h1>WORKSPACE</h1>
          <span class="dim small" x-text="'agent index ' + view.split(':')[1]"></span>
        </div>
        <hr class="thin-sep">
        <div class="dim">Phase 6 將遷移 agent 對話 / 概覽 / 待確認 / 設定。</div>
      </section>

    </main>
  </div>

  <!-- ── Gear dropdown ─────────────────────────────────────────────── -->
  <div class="gear-menu" x-show="gearOpen" @click.outside="gearOpen = false">
    <button class="menu-item" @click="modal = 'settings'; gearOpen = false">Settings</button>
    <button class="menu-item" @click="modal = 'logs'; gearOpen = false">System Logs</button>
    <button class="menu-item" @click="paletteOpen = true; gearOpen = false">
      Open Command Palette <span class="dim mono">⌘K</span>
    </button>
    <hr class="thin-sep">
    <div class="dim mono small" x-text="'Sirin v' + state.version"></div>
  </div>

  <!-- ── Command Palette ⌘K ───────────────────────────────────────── -->
  <div class="palette-backdrop" x-show="paletteOpen" @click="paletteOpen = false"></div>
  <div class="palette" x-show="paletteOpen" x-transition.opacity.duration.150ms>
    <div class="palette-header">
      <span class="dim mono small">⌘K</span>
      <span class="dim small">Command Palette</span>
      <span class="row-spacer"></span>
      <span class="dim mono small">Esc</span>
    </div>
    <input type="text" class="palette-input" x-ref="paletteInput"
           x-model="paletteQuery"
           @keydown.escape="paletteOpen = false"
           @keydown.arrow-down.prevent="paletteIdx = Math.min(paletteIdx + 1, filteredEntries.length - 1)"
           @keydown.arrow-up.prevent="paletteIdx = Math.max(paletteIdx - 1, 0)"
           @keydown.enter.prevent="runPaletteEntry(filteredEntries[paletteIdx])"
           placeholder="Type to filter…">
    <hr class="thin-sep">
    <template x-for="(entry, i) in filteredEntries" :key="entry.label">
      <button class="palette-entry" :class="i === paletteIdx ? 'active' : ''"
              @click="runPaletteEntry(entry)">
        <span class="dim mono small palette-group" x-text="entry.group"></span>
        <span x-text="entry.label"></span>
      </button>
    </template>
    <div class="dim small" x-show="filteredEntries.length === 0">No matches</div>
  </div>

  <!-- ── Modal overlays (Settings / Logs / etc — Phase 5) ──────────── -->
  <div class="modal-backdrop" x-show="modal" @click="modal = null"></div>
  <div class="modal" x-show="modal" @click.stop>
    <div class="modal-header">
      <span class="dim mono small" x-text="modal?.toUpperCase()"></span>
      <span class="row-spacer"></span>
      <button class="closebtn" @click="modal = null">✕ Close</button>
    </div>
    <hr class="thin-sep">
    <div class="modal-body">
      <div class="dim">Phase 5 將遷移 <span x-text="modal"></span> 內容。</div>
    </div>
  </div>

</div>

<!-- Alpine.js — bundled at /ui/alpine.min.js so the binary is self-contained -->
<script src="alpine.min.js" defer></script>
<script src="app.js"></script>

</body>
</html>
